<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Hi&High 飛翔提案所 - 雲端同步看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --brand-light: #00a8ff; --bg-dark: #0f172a; --accent-gold: #f1c40f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 1s ease-in-out; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 58, 138, 0.4) 100%); z-index: 1; }
        
        /* 跑馬燈：紅底白字 */
        #infoBar { position: fixed; top: 0; width: 100%; background: #ff0000; color: #ffffff; height: 100px; line-height: 100px; z-index: 100; display: none; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #marquee { position: absolute; white-space: nowrap; font-size: 4rem; font-weight: 900; animation: scrollText 15s linear infinite; padding-left: 100%; }
        @keyframes scrollText { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        .system-title { font-size: 3.5rem; font-weight: bold; margin-bottom: 30px; letter-spacing: 6px; background: linear-gradient(to right, #ffffff, var(--brand-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(0, 168, 255, 0.6); z-index: 10; }
        .display-panel { text-align: center; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); padding: 60px 140px; border-radius: 50px; border: 3px solid rgba(0, 168, 255, 0.6); position: relative; z-index: 10; }
        .label { font-size: 3.8rem; margin: 40px 0 10px 0; color: #f8fafc; }
        .current-number { font-size: 24rem; font-weight: 900; color: var(--accent-gold); line-height: 1; text-shadow: 0 0 40px rgba(241, 196, 15, 0.4); }
    </style>
</head>
<body id="bgBody">
    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    <div class="bg-overlay"></div>
    <div class="system-title">Hi&High 飛翔提案所</div>
    <div class="display-panel">
        <div class="label">請旅人準備搭乘</div>
        <div class="current-number" id="num">000</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let lastTimestamp = 0;

        db.ref('call_data').on('value', snap => {
            const data = snap.val();
            if (!data || data.timestamp === lastTimestamp) return;
            lastTimestamp = data.timestamp;
            
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;

            const bar = document.getElementById('infoBar');
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgText').innerText = data.message + "　　　　　";
                bar.style.display = "block";
            } else {
                bar.style.display = "none";
            }

            document.getElementById('num').innerText = data.number.toString().padStart(3, '0');
            
            // 語音廣播優化邏輯
            if (data.updateType === 'num') {
                synth.cancel();
                setTimeout(() => {
                    const allVoices = synth.getVoices();
                    let queue = [];
                    const pushQ = (enabled, text, voiceName, langCode) => {
                        if (enabled) {
                            let v = allVoices.find(sv => sv.name === voiceName) || allVoices.find(sv => sv.lang.includes(langCode));
                            queue.push({ text, voice: v, lang: langCode });
                        }
                    };
                    pushQ(data.langs.zh.enabled, `請第 ${data.number} 號旅人準備搭乘`, data.langs.zh.voice, 'zh');
                    pushQ(data.langs.en.enabled, `Traveler number ${data.number}, please prepare`, data.langs.en.voice, 'en');
                    pushQ(data.langs.jp.enabled, `${data.number} 番の旅人様、ご準備ください`, data.langs.jp.voice, 'ja');

                    let fullQ = [];
                    for(let i=0; i<data.repeat; i++) fullQ = fullQ.concat(queue);
                    const play = (idx) => {
                        if (idx >= fullQ.length) return;
                        const u = new SpeechSynthesisUtterance(fullQ[idx].text);
                        if (fullQ[idx].voice) u.voice = fullQ[idx].voice;
                        else u.lang = fullQ[idx].lang === 'zh' ? 'zh-TW' : (fullQ[idx].lang === 'en' ? 'en-US' : 'ja-JP');
                        u.volume = data.volume; u.rate = 0.9;
                        u.onend = () => play(idx + 1);
                        synth.speak(u);
                    };
                    play(0);
                }, 200);
            }
        });
        document.onclick = () => synth.speak(new SpeechSynthesisUtterance(""));
    </script>
</body>
</html>
