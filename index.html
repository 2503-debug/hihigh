<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所</title>
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --ios-bg: #0f172a;
            --ios-glass: rgba(255, 255, 255, 0.12);
            --ios-accent: #00d2ff;
            --ios-yellow: #ffcc00;
            --ios-green: #34c759;
            --apple-radius: 35px;
            --marquee-height: 44px;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center;
            overflow-x: hidden;
            transition: padding-top 0.3s ease;
        }

        #infoBar {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--marquee-height);
            background: rgba(255, 59, 48, 0.95); backdrop-filter: blur(20px);
            z-index: 2000; display: none; overflow: hidden;
        }
        #marquee { line-height: var(--marquee-height); white-space: nowrap; font-size: 1.1rem; font-weight: 700; animation: scrollText 15s linear infinite; }
        @keyframes scrollText { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        body.has-marquee { padding-top: var(--marquee-height); }

        .system-title { 
            font-size: 2.8rem; font-weight: 900; letter-spacing: -1px;
            margin: 20px 0; text-align: center;
            background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .display-panel { 
            text-align: center; background: var(--ios-glass); 
            backdrop-filter: blur(30px) saturate(180%); 
            width: 88%; max-width: 800px; 
            padding: 40px 20px; border-radius: var(--apple-radius); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 10; 
        }

        .panel-header { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .label-en { font-size: 0.9rem; font-weight: 700; letter-spacing: 4px; color: #94a3b8; }
        .label-zh { font-size: 1.2rem; font-weight: 900; color: #fff; }

        .current-number { 
            font-size: 14rem; font-weight: 900; color: var(--ios-yellow); 
            line-height: 1; margin: 15px 0;
            filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.4));
            transition: font-size 0.3s ease;
        }
        /* 區間樣式優化：稍微縮小避免跑版 */
        .is-range { font-size: 10rem !important; letter-spacing: -2px; }

        .panel-footer { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .footer-zh { font-size: 1.4rem; font-weight: 700; color: #fff; }
        .footer-en { font-size: 0.85rem; font-weight: 400; color: #94a3b8; }

        .traveler-input-box { display: none; }
        
        .stat-container { display: flex; gap: 12px; margin-top: 30px; z-index: 100; }
        .stat-pill { background: rgba(0,0,0,0.3); padding: 10px 18px; border-radius: 40px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-weight: 900; color: var(--ios-accent); margin-left: 6px; }

        #audioBtn { 
            position: fixed; bottom: 30px; right: 20px; z-index: 1001; 
            background: var(--ios-green); color: white; border: none; padding: 16px 28px; 
            border-radius: 30px; font-weight: 700; box-shadow: 0 8px 20px rgba(52, 199, 89, 0.3); 
            cursor: pointer;
        }

        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; overflow-y: auto; }
            .system-title { margin-top: 40px; font-size: 2.2rem; }
            .current-number { font-size: 30vw; }
            .is-range { font-size: 18vw !important; }
            .traveler-input-box { display: flex; flex-direction: column; align-items: center; margin-top: 25px; width: 90%; max-width: 400px; z-index: 20; }
            .setup-guide { background: rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 18px; margin-bottom: 20px; font-size: 0.9rem; width: 100%; }
            .num-in { width: 180px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: var(--ios-accent); font-size: 3.5rem; text-align: center; border-radius: 20px; outline: none; }
            .stat-container { margin-bottom: 120px; }
        }

        @media screen and (min-width: 1025px) {
            .current-number { font-size: 20rem; }
            .is-range { font-size: 14rem !important; }
            .display-panel { max-width: 900px; padding: 30px 40px; }
        }

        #matchModal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ff3b30; z-index: 9999; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            animation: iosFlash 0.5s infinite alternate; 
        }
        @keyframes iosFlash { from { opacity: 1; } to { opacity: 0.85; } }
    </style>
</head>
<body id="bgBody">

    <div id="infoBar"><div id="marquee"><span id="msgContent"></span></div></div>

    <div id="matchModal">
        <div style="font-size: 2rem; font-weight: 900; margin-bottom: 20px;">到您的號碼了</div>
        <div style="font-size: 25vw; font-weight: 900; color: #fff; line-height: 1;" id="modalShow">000</div>
        <p style="font-size: 1.5rem; font-weight: 700; margin-top: 20px;">請至櫃檯準備搭乘</p>
        <button onclick="closeModal()" style="background:white; color:black; border:none; padding:20px 60px; border-radius:35px; font-size:1.5rem; font-weight:700; margin-top:40px; cursor:pointer;">關閉提醒</button>
    </div>

    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel">
        <div class="panel-header">
            <span class="label-en">CURRENT NUMBER</span>
            <span class="label-zh">目前叫號</span>
        </div>
        <div class="current-number" id="num">000</div>
        <div class="panel-footer">
            <div class="footer-zh">請至櫃檯準備搭乘</div>
            <div class="footer-en">Please Proceed to the Counter</div>
        </div>
    </div>

    <div class="traveler-input-box">
        <div class="setup-guide">
            <div style="color:var(--ios-yellow); font-weight:700; text-align:center; margin-bottom:8px;">⚙️ 背景提醒設定指南</div>
            <div style="font-size: 0.85rem; opacity: 0.9; line-height: 1.6;">
                • 點擊右下角 <span style="color:#34c759; font-weight:bold;">啟動語音</span><br>
                • iPhone 請關閉 <span style="color:#ff3b30; font-weight:bold;">側邊靜音鍵</span><br>
                • 建議不要關閉此網頁，以利背景接收通知
            </div>
        </div>
        <p style="font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: #94a3b8; text-align: center;">輸入領取的號碼牌到號通知</p>
        <input type="number" id="myNum" class="num-in" placeholder="000" oninput="saveNum()">
        <div id="inputStatusText" style="color:var(--ios-yellow); margin-top:12px; font-weight:700;"></div>
    </div>

    <div class="stat-container">
        <div class="stat-pill">已發票數<span id="totalIssued" class="stat-value">0</span></div>
        <div class="stat-pill">在線旅人<span id="onlineCount" class="stat-value">0</span></div>
    </div>

    <button id="audioBtn" onclick="initAudio()">🔊 啟動語音提醒</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let emergencyTimer = null;
        let lastTs = 0;
        const myId = Math.random().toString(36).substring(7);

        function initAudio() {
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==');
            silentAudio.loop = true;
            silentAudio.play().catch(()=>{});
            synth.cancel();
            const u = new SpeechSynthesisUtterance("語音系統已啟動。");
            u.lang = 'zh-TW';
            synth.speak(u);
            document.getElementById('audioBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('matchModal').style.display = 'none';
            stopEmergencyAlert();
        }

        function saveNum() {
            const val = document.getElementById('myNum').value;
            localStorage.setItem('hihigh_num', val);
            document.getElementById('inputStatusText').innerText = val !== "" ? `✅ 已鎖定第 ${val} 號` : "";
            updateTravelerStatus();
        }

        function updateTravelerStatus() {
            const val = document.getElementById('myNum').value;
            if (val !== "") db.ref('traveler_stats/' + myId).set({ role: 'mobile', ts: Date.now() });
            else db.ref('traveler_stats/' + myId).remove();
        }
        db.ref('traveler_stats/' + myId).onDisconnect().remove();

        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
            
            if (data.message) {
                document.getElementById('msgContent').innerText = data.message + "　　　" + data.message;
                document.getElementById('infoBar').style.display = "block";
                document.body.classList.add('has-marquee');
            } else { 
                document.getElementById('infoBar').style.display = "none";
                document.body.classList.remove('has-marquee');
            }

            if (data.timestamp > lastTs) {
                lastTs = data.timestamp;
                // 核心修正：將資料轉為字串並直接顯示
                const rawNum = String(data.number); 
                const numDisplay = document.getElementById('num');
                
                // 區間顯示邏輯
                if (rawNum.includes('-')) {
                    numDisplay.classList.add('is-range');
                    numDisplay.innerText = rawNum; // 顯示 XX-XX
                } else {
                    numDisplay.classList.remove('is-range');
                    // 只有單號時補零
                    numDisplay.innerText = rawNum.padStart(3, '0'); 
                }
                
                const myInput = document.getElementById('myNum').value;
                const my = parseInt(myInput);
                const isMobile = window.innerWidth <= 1024;

                let isMatch = false;
                if (rawNum.includes('-')) {
                    const parts = rawNum.split('-');
                    const start = parseInt(parts[0]);
                    const end = parseInt(parts[1]);
                    if (!isNaN(my) && my >= start && my <= end) isMatch = true;
                } else {
                    if (!isNaN(my) && my === parseInt(rawNum)) isMatch = true;
                }

                if (isMatch && isMobile) {
                    startEmergencyAlert(rawNum);
                } else {
                    stopEmergencyAlert();
                    if (!isMobile || (isMobile && isNaN(my))) {
                        playAdminVoices(rawNum, data.langs || {});
                    }
                }
            }
        });

        function playAdminVoices(numStr, langs) {
            synth.cancel();
            const voiceList = ['zh', 'en', 'jp'];
            const voiceNum = numStr.includes('-') ? numStr.replace('-', '到') : numStr;
            const voiceNumEn = numStr.includes('-') ? numStr.replace('-', ' to ') : numStr;

            voiceList.forEach(lKey => {
                const conf = langs[lKey];
                if (conf && conf.enabled) {
                    for (let i = 0; i < (conf.repeat || 1); i++) {
                        let txt = "";
                        if(lKey === 'zh') txt = `請號碼 ${voiceNum} 的旅人準備搭乘`;
                        if(lKey === 'en') txt = `Number ${voiceNumEn}, please come to the counter.`;
                        if(lKey === 'jp') txt = `${voiceNum} 番のお客様、カウンターまでお越しください。`;
                        const u = new SpeechSynthesisUtterance(txt);
                        u.lang = lKey==='zh'?'zh-TW':(lKey==='en'?'en-US':'ja-JP');
                        if(conf.voice) u.voice = synth.getVoices().find(v => v.name === conf.voice) || null;
                        synth.speak(u);
                    }
                }
            });
        }

        function startEmergencyAlert(numStr) {
            stopEmergencyAlert();
            // 彈窗也同步更新顯示內容
            const displayNum = numStr.includes('-') ? numStr : numStr.padStart(3, '0');
            document.getElementById('modalShow').innerText = displayNum;
            document.getElementById('matchModal').style.display = 'flex';
            
            const voiceNum = numStr.includes('-') ? numStr.replace('-', '到') : numStr;
            const alarm = () => {
                const u = new SpeechSynthesisUtterance(`請旅人 ${voiceNum} 號至櫃台準備搭乘。`);
                u.lang = 'zh-TW'; u.rate = 0.9;
                synth.speak(u);
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            };
            alarm();
            emergencyTimer = setInterval(alarm, 7000);
        }

        function stopEmergencyAlert() {
            if (emergencyTimer) { clearInterval(emergencyTimer); emergencyTimer = null; }
            synth.cancel();
            if (navigator.vibrate) navigator.vibrate(0);
        }

        db.ref('traveler_stats').on('value', snap => {
            document.getElementById('onlineCount').innerText = Object.keys(snap.val() || {}).length;
        });
        db.ref('issue_stats/totalIssued').on('value', snap => {
            document.getElementById('totalIssued').innerText = snap.val() || 0;
        });

        setTimeout(() => { location.reload(); }, 1800000);
        window.onload = () => {
            const saved = localStorage.getItem('hihigh_num') || "";
            document.getElementById('myNum').value = saved;
            if(saved !== "") document.getElementById('inputStatusText').innerText = `✅ 已鎖定第 ${saved} 號`;
            updateTravelerStatus();
        };
    </script>
</body>
</html>
