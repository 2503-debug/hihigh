<style>
    /* ... 前面的樣式保持不變 ... */

    /* 新增：輸入成功的閃爍效果 */
    .save-success {
        animation: successFlash 0.5s ease-out;
    }
    @keyframes successFlash {
        0% { border-color: var(--brand-light); box-shadow: 0 0 0px var(--success); }
        50% { border-color: #27ae60; box-shadow: 0 0 20px #27ae60; }
        100% { border-color: var(--brand-light); box-shadow: 0 0 0px var(--success); }
    }

    /* 提示文字樣式 */
    #saveStatus {
        font-size: 0.85rem;
        height: 1.2rem;
        color: #27ae60;
        font-weight: bold;
        margin-top: 5px;
        opacity: 0;
        transition: opacity 0.3s;
    }
</style>

<div class="traveler-box" id="travelerUI">
    <span>請輸入您抽的號碼</span>
    <input type="number" id="myNumInput" placeholder="---" oninput="handleNumInput()">
    <div id="saveStatus">✓ 設定成功，到號時將自動提醒</div>
</div>

<script>
    // ... Firebase 與其他變數保持不變 ...

    let saveTimer; // 用來控制提示文字消失

    function handleNumInput() {
        const input = document.getElementById('myNumInput');
        const status = document.getElementById('saveStatus');
        
        // 1. 儲存號碼
        localStorage.setItem('hihigh_num', input.value);

        // 2. 觸發視覺反饋 (只有當有輸入數字時)
        if (input.value.length > 0) {
            // 重置動畫
            input.classList.remove('save-success');
            void input.offsetWidth; // 強制重繪
            input.classList.add('save-success');

            // 顯示提醒文字
            status.style.opacity = "1";
            
            // 3 秒後自動隱藏提醒文字
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                status.style.opacity = "0";
            }, 3000);
        } else {
            status.style.opacity = "0";
        }
    }

    // 確保 window.onload 也有載入正確的 function 名稱
    window.onload = () => {
        const saved = localStorage.getItem('hihigh_num');
        if(saved) document.getElementById('myNumInput').value = saved;
    };

    // ... 剩下的 Firebase 監聽與語音邏輯保持不變 ...
</script>
