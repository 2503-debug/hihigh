<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi&High 飛翔提案所 - 雲端同步看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --brand-light: #00a8ff; --bg-dark: #0f172a; --accent-gold: #f1c40f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 1s ease-in-out; }
        
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 58, 138, 0.4) 100%); z-index: 1; }
        
        /* 語音啟動按鈕 */
        #audioUnlockBtn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; background: #27ae60; color: white; border: none;
            padding: 15px 30px; font-size: 1.5rem; font-weight: bold; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            display: flex; align-items: center; gap: 10px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7); }
            70% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 0 20px rgba(39, 174, 96, 0); }
            100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); }
        }

        /* 跑馬燈 */
        #infoBar { position: fixed; top: 3%; width: 90%; left: 5%; background: #ff0000; color: #ffffff; height: 80px; line-height: 80px; z-index: 100; display: none; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); border-radius: 15px; border: 2px solid rgba(255,255,255,0.3); }
        #marquee { position: absolute; white-space: nowrap; font-size: 3rem; font-weight: 900; animation: scrollText 12s linear infinite; padding-left: 100%; }
        @keyframes scrollText { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* 主面板 */
        .system-title { font-size: 4vw; font-weight: bold; margin-bottom: 20px; letter-spacing: 0.5vw; background: linear-gradient(to right, #ffffff, var(--brand-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 10; }
        .display-panel { text-align: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); width: 85%; max-width: 1200px; padding: 4vw 2vw; border-radius: 40px; border: 4px solid rgba(0, 168, 255, 0.5); position: relative; z-index: 10; }
        .label { font-size: 3.5vw; margin-bottom: 10px; color: #f8fafc; font-weight: bold; }
        .current-number { font-size: 20vw; font-weight: 900; color: var(--accent-gold); line-height: 0.9; text-shadow: 0 0 50px rgba(241, 196, 15, 0.5); }
    </style>
</head>
<body id="bgBody">
    <button id="audioUnlockBtn" onclick="unlockAudio()">
        <span>🔊</span> 點擊啟動即時叫號
    </button>

    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    <div class="bg-overlay"></div>
    <div class="system-title">Hi&High 飛翔提案所</div>
    <div class="display-panel">
        <div class="label">請旅人準備搭乘</div>
        <div class="current-number" id="num">000</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let lastTimestamp = 0;

        // 語音解鎖函數
        function unlockAudio() {
            const unlock = new SpeechSynthesisUtterance("語音系統已啟動");
            unlock.lang = "zh-TW";
            unlock.volume = 0.5;
            synth.speak(unlock);
            
            // 隱藏按鈕
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        db.ref('call_data').on('value', snap => {
            const data = snap.val();
            if (!data || data.timestamp === lastTimestamp) return;
            lastTimestamp = data.timestamp;
            
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;

            const bar = document.getElementById('infoBar');
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgText').innerText = data.message + "　　　　　";
                bar.style.display = "block";
            } else {
                bar.style.display = "none";
            }

            document.getElementById('num').innerText = data.number.toString().padStart(3, '0');
            
            if (data.updateType === 'num') {
                synth.cancel();
                setTimeout(() => {
                    const allVoices = synth.getVoices();
                    let queue = [];
                    const getV = (pref, lang) => allVoices.find(v => v.name === pref) || allVoices.find(v => v.lang.includes(lang));

                    if (data.langs.zh.enabled) {
                        const u = new SpeechSynthesisUtterance(`請第 ${data.number} 號旅人準備搭乘`);
                        u.voice = getV(data.langs.zh.voice, 'zh'); u.lang = 'zh-TW'; queue.push(u);
                    }
                    if (data.langs.en.enabled) {
                        const u = new SpeechSynthesisUtterance(`Traveler number ${data.number}, please prepare`);
                        u.voice = getV(data.langs.en.voice, 'en'); u.lang = 'en-US'; queue.push(u);
                    }
                    if (data.langs.jp.enabled) {
                        const u = new SpeechSynthesisUtterance(`${data.number} 番の旅人様、ご準備ください`);
                        u.voice = getV(data.langs.jp.voice, 'ja'); u.lang = 'ja-JP'; queue.push(u);
                    }

                    const play = (idx) => {
                        if (idx >= queue.length) return;
                        queue[idx].volume = data.volume || 1;
                        queue[idx].rate = 0.9;
                        queue[idx].onend = () => play(idx + 1);
                        synth.speak(queue[idx]);
                    };
                    for (let r = 0; r < (data.repeat || 1); r++) play(0);
                }, 150);
            }
        });
    </script>
</body>
</html>
