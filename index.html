<div class="traveler-box" id="travelerUI">
    <span>請輸入您抽的號碼</span>
    <input type="number" id="myNumInput" placeholder="---" oninput="triggerSaveFeedback()">
    <div id="saveStatus" style="opacity: 0; color: #27ae60; font-weight: bold; margin-top: 8px; transition: opacity 0.3s; font-size: 1rem;">
        ✓ 設定成功，到號時將自動提醒
    </div>
</div>

<script>
    // --- 這裡放更新後的 JavaScript 邏輯 ---

    let saveStatusTimer;

    function triggerSaveFeedback() {
        const inputEl = document.getElementById('myNumInput');
        const statusEl = document.getElementById('saveStatus');
        
        // 1. 立即儲存至本地
        localStorage.setItem('hihigh_num', inputEl.value);

        // 2. 判斷是否有內容，才顯示提醒
        if (inputEl.value.trim() !== "") {
            // 視覺回饋：輸入框閃爍綠光
            inputEl.style.borderColor = "#27ae60";
            inputEl.style.boxShadow = "0 0 15px rgba(39, 174, 96, 0.6)";

            // 顯示文字
            statusEl.style.opacity = "1";

            // 0.5 秒後恢復輸入框顏色 (但保留文字)
            setTimeout(() => {
                inputEl.style.borderColor = "var(--accent-gold)";
                inputEl.style.boxShadow = "none";
            }, 500);

            // 3 秒後隱藏「設定成功」文字
            clearTimeout(saveStatusTimer);
            saveStatusTimer = setTimeout(() => {
                statusEl.style.opacity = "0";
            }, 3000);
        } else {
            // 如果清空輸入框，就直接隱藏文字
            statusEl.style.opacity = "0";
        }
    }

    // 確保原本的 window.onload 同時具備載入語音與載入號碼的功能
    window.onload = () => {
        if (typeof loadVoices === "function") loadVoices();
        const savedNum = localStorage.getItem('hihigh_num');
        if (savedNum) {
            document.getElementById('myNumInput').value = savedNum;
        }
    };
</script>
