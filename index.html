<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所 - 專業雲端看板</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="飛翔叫號">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <link rel="manifest" href="data:application/manifest+json,
    {
      'name': 'Hi&High 飛翔叫號系統',
      'short_name': '飛翔叫號',
      'start_url': '.',
      'display': 'standalone',
      'orientation': 'any',
      'background_color': '#0f172a',
      'theme_color': '#00d2ff'
    }">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --brand-cyan: #00d2ff; 
            --accent-gold: #f1c40f; 
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* 強力蓋版彈窗樣式 */
        #matchModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.95);
            z-index: 9999; display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            text-align: center; animation: modalFlash 0.5s infinite alternate;
            padding: 20px; box-sizing: border-box;
        }
        @keyframes modalFlash {
            from { background: rgba(220, 38, 38, 0.98); }
            to { background: rgba(0, 0, 0, 0.98); }
        }
        #matchModal h1 { font-size: 10vw; margin: 0; font-weight: 900; letter-spacing: 2px; }
        #matchModal p { font-size: 5vw; margin: 10px 0; opacity: 0.9; }
        #matchModal .modal-num { font-size: 35vw; font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); line-height: 1; text-shadow: 0 0 50px rgba(241, 196, 15, 0.5); }
        #matchModal .close-btn {
            background: white; color: black; padding: 18px 60px;
            border-radius: 100px; font-weight: 900; font-size: 6vw;
            border: none; margin-top: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; background: #000; position: relative; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-image: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f172a, #1e40af);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #infoBar {
            position: fixed; top: env(safe-area-inset-top, 15px); width: 94%; left: 3%;
            background: rgba(231, 76, 60, 0.95); backdrop-filter: blur(10px);
            color: white; height: 70px; line-height: 70px; z-index: 100; display: none; overflow: hidden; border-radius: 50px;
        }
        #marquee { position: absolute; white-space: nowrap; font-size: 2.2rem; font-weight: 900; animation: scrollText 20s linear infinite; }

        .system-title { font-size: 2.8vw; font-weight: 900; margin-bottom: 20px; color: white; text-shadow: 0 0 20px rgba(0, 210, 255, 0.8); z-index: 10; }
        .display-panel {
            text-align: center; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 70%; max-width: 850px; padding: 50px 40px; border-radius: 40px; border: 1px solid var(--glass-border);
            z-index: 10; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .current-number { font-family: 'Montserrat', sans-serif; font-size: 15vw; font-weight: 900; color: var(--accent-gold); line-height: 1; }

        .waiting-status {
            position: fixed; bottom: env(safe-area-inset-bottom, 30px); right: 30px; 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px 25px; 
            border-radius: 25px; border: 1px solid var(--glass-border); color: white; z-index: 100;
        }

        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 100px; }
            .system-title { font-size: 8vw; }
            .display-panel { width: 88%; padding: 40px 15px; }
            .current-number { font-size: 32vw; }
            .traveler-box {
                display: flex !important; flex-direction: column; align-items: center;
                width: 85%; background: var(--glass); padding: 25px; border-radius: 30px;
                border: 1px solid var(--glass-border); margin: 30px auto; z-index: 20;
            }
            .traveler-box input {
                width: 150px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid var(--brand-cyan);
                color: var(--brand-cyan); font-size: 3rem; font-family: 'Montserrat'; font-weight: 900;
                text-align: center; border-radius: 20px; outline: none; margin-top: 15px;
            }
        }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body id="bgBody">

    <div id="matchModal">
        <h1>您的號碼到了！</h1>
        <p>請前往櫃台搭乘</p>
        <div class="modal-num" id="modalNumShow">000</div>
        <button class="close-btn" onclick="closeMatchModal()">我知道了</button>
    </div>

    <button id="audioUnlockBtn" onclick="unlockAudio()" style="position:fixed; bottom:20px; left:20px; z-index:9999; background:#27ae60; color:white; border:none; padding:15px 25px; border-radius:50px; font-weight:900; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">🔊 啟動叫號語音系統</button>

    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    
    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel" id="mainPanel">
        <div style="font-size:1.8vw; color:#cbd5e1; margin-bottom:15px; font-weight:700;">目前叫號</div>
        <div class="current-number" id="num">000</div>
        <div style="margin-top:15px; font-size:1.2vw; color:var(--brand-cyan); font-weight:500;">請旅人準備搭乘</div>
    </div>

    <div class="traveler-box" style="display:none;">
        <span style="color:#fff; font-weight:bold;">輸入您的抽獎號碼</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="triggerFeedback()">
        <div id="saveStatus" style="opacity:0; color:#2ecc71; font-size:0.85rem; margin-top:10px;">✓ 已開啟自動提醒</div>
    </div>

    <div class="waiting-status">
        <div style="font-size:0.9rem; color:#cbd5e1;">目前在線 (手機)</div>
        <span id="uiWaitingCount" style="font-size:2.2rem; font-weight:900; color:var(--brand-cyan); font-family: 'Montserrat';">0</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        const myId = Math.random().toString(36).substring(7);
        const travelerRef = db.ref('traveler_stats/' + myId);

        function closeMatchModal() {
            document.getElementById('matchModal').style.display = 'none';
            synth.cancel();
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("系統已就緒"); u.lang = "zh-TW"; 
            synth.speak(u); 
            document.getElementById('audioUnlockBtn').style.display = 'none';
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(() => {});
            }
        }

        function triggerFeedback() {
            localStorage.setItem('hihigh_num', document.getElementById('myNumInput').value);
            updateOnlineStatus();
            document.getElementById('saveStatus').style.opacity = "1";
            setTimeout(() => { document.getElementById('saveStatus').style.opacity = "0"; }, 2000);
        }

        function updateOnlineStatus() {
            const isMobile = window.innerWidth <= 1024;
            const myNum = document.getElementById('myNumInput').value;
            if (isMobile && myNum !== "") { 
                travelerRef.set({ isWaiting: true, role: 'mobile', timestamp: firebase.database.ServerValue.TIMESTAMP }); 
            } else { travelerRef.remove(); }
        }
        travelerRef.onDisconnect().remove();

        db.ref('traveler_stats').on('value', snap => { 
            const list = snap.val() || {};
            const mobileCount = Object.values(list).filter(item => item.role === 'mobile').length;
            document.getElementById('uiWaitingCount').innerText = mobileCount; 
        });

        window.onload = () => {
            if(localStorage.getItem('hihigh_num')) document.getElementById('myNumInput').value = localStorage.getItem('hihigh_num');
            updateOnlineStatus();
        };

        let lastTimestamp = 0;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgText').innerText = data.message + "　　　　　";
                document.getElementById('infoBar').style.display = "block";
            } else { document.getElementById('infoBar').style.display = "none"; }
            
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                document.getElementById('num').innerText = data.number.toString().padStart(3, '0');
                handleVoiceCall(data);
            }
        });

        function handleVoiceCall(data) {
            synth.cancel();
            const isBigScreen = window.innerWidth > 1024;
            const myNum = document.getElementById('myNumInput').value;
            const isMatched = (myNum && parseInt(myNum) === data.number);
            
            // 手機版號碼匹配：彈窗 + 震動
            if (!isBigScreen && isMatched) {
                document.getElementById('modalNumShow').innerText = data.number.toString().padStart(3, '0');
                document.getElementById('matchModal').style.display = 'flex';
                if (navigator.vibrate) {
                    // 長震動組合
                    navigator.vibrate([500, 200, 500, 200, 500, 200, 800]);
                }
            }

            if (!isBigScreen && !isMatched) return;

            setTimeout(() => {
                let queue = [];
                if (isMatched) {
                    const m = new SpeechSynthesisUtterance("旅人您好，您的號碼到了，請準備搭乘");
                    m.lang = "zh-TW"; m.volume = 1; queue.push(m);
                }
                const confs = [
                    {k:'zh', t:`請第 ${data.number} 號旅人準備搭乘`, l:'zh-TW'},
                    {k:'en', t:`Number ${data.number}, please prepare`, l:'en-US'},
                    {k:'jp', t:`${data.number} 番の旅人様、ご準備ください`, l:'ja-JP'}
                ];
                confs.forEach(c => {
                    const setting = data.langs[c.k];
                    if(setting && setting.enabled) {
                        for(let i=0; i<setting.repeat; i++) {
                            const u = new SpeechSynthesisUtterance(c.t); u.lang = c.l; queue.push(u);
                        }
                    }
                });
                const play = (i) => { 
                    if (i >= queue.length) return; 
                    queue[i].onend = () => setTimeout(() => play(i+1), 400); 
                    synth.speak(queue[i]); 
                };
                play(0);
            }, 300);
        }
    </script>
</body>
</html>
