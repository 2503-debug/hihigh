<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hi&High 飛翔提案所 - 雲端同步看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --brand-light: #00a8ff; --bg-dark: #0f172a; --accent-gold: #f1c40f; --danger: #e74c3c; --success: #27ae60; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.8s ease-in-out; position: relative; }
        
        /* 背景遮罩 */
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 58, 138, 0.4) 100%); z-index: 1; pointer-events: none; }
        
        /* 啟動按鈕 */
        #audioUnlockBtn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 9999; background: var(--success); color: white; border: none;
            padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7); }
            70% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 0 15px rgba(39, 174, 96, 0); }
            100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); }
        }

        /* 跑馬燈 */
        #infoBar { position: fixed; top: 3%; width: 90%; left: 5%; background: #ff0000; color: #ffffff; height: 60px; line-height: 60px; z-index: 100; display: none; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); border-radius: 15px; }
        #marquee { position: absolute; white-space: nowrap; font-size: 2.2rem; font-weight: 900; animation: scrollText 15s linear infinite; padding-left: 100%; }
        @keyframes scrollText { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        /* 主看板 */
        .system-title { font-size: 3.5vw; font-weight: bold; margin-bottom: 15px; letter-spacing: 0.5vw; background: linear-gradient(to right, #ffffff, var(--brand-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 10; text-align: center; }
        .display-panel { text-align: center; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); width: 80%; max-width: 900px; padding: 4vh 2vw; border-radius: 40px; border: 4px solid rgba(0, 168, 255, 0.5); position: relative; z-index: 10; display: block !important; }
        .label { font-size: 2.5vw; margin-bottom: 10px; color: #f8fafc; font-weight: bold; }
        .current-number { font-size: 16vw; font-weight: 900; color: var(--accent-gold); line-height: 1; text-shadow: 0 0 50px rgba(241, 196, 15, 0.5); }

        /* 旅人手機輸入區 (電腦版隱藏) */
        .traveler-box { display: none !important; }

        @media screen and (max-width: 1024px) {
            .system-title { font-size: 8vw; margin-top: 20px; }
            .label { font-size: 6vw; }
            .current-number { font-size: 32vw; }
            .display-panel { width: 85%; }
            .traveler-box {
                display: flex !important; flex-direction: column; align-items: center;
                margin-top: 30px; z-index: 20; background: rgba(0, 168, 255, 0.15);
                padding: 20px; border-radius: 25px; border: 2px solid var(--brand-light);
                color: white; gap: 10px; box-shadow: 0 0 20px rgba(0, 168, 255, 0.2);
            }
            .traveler-box span { font-size: 1.1rem; font-weight: bold; }
            .traveler-box input {
                width: 130px; height: 60px; background: rgba(0,0,0,0.7); border: 3px solid var(--accent-gold);
                color: var(--accent-gold); font-size: 2.5rem; font-weight: 900;
                text-align: center; border-radius: 15px; outline: none;
            }
        }

        /* 到號特效 */
        .matched-alert { 
            border-color: var(--danger) !important; 
            box-shadow: 0 0 80px rgba(231, 76, 60, 0.8) !important;
            transform: scale(1.03);
            animation: flashBorder 0.5s infinite alternate;
        }
        @keyframes flashBorder { from { border-color: var(--danger); } to { border-color: white; } }
    </style>
</head>
<body id="bgBody">

    <button id="audioUnlockBtn" onclick="unlockAudio()">🔊 點擊啟動語音系統</button>

    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    <div class="bg-overlay"></div>
    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel" id="mainPanel">
        <div class="label">請旅人準備搭乘</div>
        <div class="current-number" id="num">000</div>
    </div>

    <div class="traveler-box" id="travelerUI">
        <span>輸入您的抽獎號碼</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="triggerFeedback()">
        <div id="saveStatus" style="opacity: 0; color: #27ae60; font-size: 0.9rem; transition: 0.3s;">✓ 已設定提醒</div>
    </div>

    <script>
        // --- Firebase 配置 (請保持與 admin.html 一致) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        
        // 旅人統計邏輯
        const myId = Math.random().toString(36).substring(7);
        const travelerRef = db.ref('traveler_stats/' + myId);

        function updateOnlineStatus() {
            const myNum = document.getElementById('myNumInput').value;
            travelerRef.set({
                isWaiting: myNum !== "",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }
        travelerRef.onDisconnect().remove();

        function triggerFeedback() {
            const inputEl = document.getElementById('myNumInput');
            const statusEl = document.getElementById('saveStatus');
            localStorage.setItem('hihigh_num', inputEl.value);
            updateOnlineStatus();
            
            if (inputEl.value !== "") {
                statusEl.style.opacity = "1";
                setTimeout(() => { statusEl.style.opacity = "0"; }, 2000);
            }
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("系統連線成功");
            u.lang = "zh-TW";
            synth.speak(u);
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        window.onload = () => {
            const saved = localStorage.getItem('hihigh_num');
            if(saved) document.getElementById('myNumInput').value = saved;
            updateOnlineStatus();
        };

        // 核心同步邏輯
        let lastTimestamp = 0;
        let isSpeaking = false;

        db.ref('call_data').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            // 1. 背景圖更新 (支援 Base64)
            if (data.bg) {
                document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;
            }

            // 2. 跑馬燈更新
            const bar = document.getElementById('infoBar');
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgText').innerText = data.message + "　　　　　";
                bar.style.display = "block";
            } else { bar.style.display = "none"; }

            // 3. 號碼與語音
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                document.getElementById('num').innerText = data.number.toString().padStart(3, '0');
                
                if (data.updateType === 'num') {
                    handleVoiceCall(data);
                }
            }
        });

        function handleVoiceCall(data) {
            synth.cancel();
            isSpeaking = false;

            const isBigScreen = window.innerWidth > 1024;
            const myNum = document.getElementById('myNumInput').value;
            const isMatched = (myNum && parseInt(myNum) === data.number);

            // 手機版若非本人號碼則靜音
            if (!isBigScreen && !isMatched) return;

            setTimeout(() => {
                if (isSpeaking) return;
                isSpeaking = true;

                let queue = [];
                const voices = synth.getVoices();
                const getV = (name) => voices.find(v => v.name === name);

                // 匹配特效
                if (isMatched) {
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                    const panel = document.getElementById('mainPanel');
                    panel.classList.add('matched-alert');
                    setTimeout(() => panel.classList.remove('matched-alert'), 10000);
                    
                    const m = new SpeechSynthesisUtterance("旅人您好，您的號碼到了，請準備搭乘");
                    m.lang = "zh-TW"; m.pitch = 1.2;
                    queue.push(m);
                }

                // 廣播內容
                const langs = [
                    { key: 'zh', text: `請第 ${data.number} 號旅人準備搭乘`, lang: 'zh-TW' },
                    { key: 'en', text: `Traveler number ${data.number}, please prepare`, lang: 'en-US' },
                    { key: 'jp', text: `${data.number} 番の旅人様、ご準備ください`, lang: 'ja-JP' }
                ];

                langs.forEach(l => {
                    if (data.langs[l.key] && data.langs[l.key].enabled) {
                        const u = new SpeechSynthesisUtterance(l.text);
                        u.voice = getV(data.langs[l.key].voice);
                        u.lang = l.lang;
                        u.rate = 0.9;
                        queue.push(u);
                    }
                });

                const play = (idx) => {
                    if (idx >= queue.length) { isSpeaking = false; return; }
                    queue[idx].onend = () => play(idx + 1);
                    synth.speak(queue[idx]);
                };
                play(0);
            }, 200);
        }
    </script>
</body>
</html>
