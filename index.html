<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所 - 專業雲端看板</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="飛翔叫號">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --brand-cyan: #00d2ff; 
            --accent-gold: #f1c40f; 
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* 強力蓋版提醒容器 - 初始狀態必須是隱藏 */
        #matchModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 38, 38, 0.98);
            z-index: 99999; display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            text-align: center; animation: modalFlash 0.5s infinite alternate;
            padding: 20px; box-sizing: border-box;
        }
        @keyframes modalFlash {
            from { background: rgba(220, 38, 38, 0.98); }
            to { background: rgba(0, 0, 0, 0.98); }
        }
        #matchModal h1 { font-size: 10vw; margin: 0; font-weight: 900; }
        #matchModal p { font-size: 5vw; margin: 10px 0; }
        #matchModal .modal-num { font-size: 35vw; font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); line-height: 1; }
        #matchModal .close-btn {
            background: white; color: black; padding: 18px 60px;
            border-radius: 100px; font-weight: 900; font-size: 6vw;
            border: none; margin-top: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-image: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f172a, #1e40af);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 主面板 */
        .display-panel {
            text-align: center; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 80%; max-width: 850px; padding: 50px 40px; border-radius: 40px; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .current-number { font-family: 'Montserrat', sans-serif; font-size: 15vw; font-weight: 900; color: var(--accent-gold); line-height: 1; }

        /* 手機版輸入區 */
        .traveler-box {
            display: none; flex-direction: column; align-items: center;
            width: 85%; background: var(--glass); padding: 25px; border-radius: 30px;
            border: 1px solid var(--glass-border); margin-top: 30px;
        }
        .traveler-box input {
            width: 150px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid var(--brand-cyan);
            color: var(--brand-cyan); font-size: 3rem; font-family: 'Montserrat'; font-weight: 900;
            text-align: center; border-radius: 20px; outline: none; margin-top: 15px;
        }

        #audioUnlockBtn {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: #27ae60; color: white; border: none; padding: 15px 25px;
            border-radius: 50px; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 60px; }
            .display-panel { width: 85%; padding: 30px 10px; }
            .current-number { font-size: 30vw; }
            .traveler-box { display: flex; }
        }
    </style>
</head>
<body id="bgBody">

    <div id="matchModal">
        <h1>您的號碼到了！</h1>
        <p>請前往櫃台搭乘</p>
        <div class="modal-num" id="modalNumShow">000</div>
        <button class="close-btn" onclick="closeMatchModal()">我知道了</button>
    </div>

    <button id="audioUnlockBtn" onclick="unlockAudio()">🔊 啟動叫號提醒系統</button>
    
    <div class="display-panel">
        <div style="font-size:4vw; color:#cbd5e1; margin-bottom:10px; font-weight:700;">目前叫號</div>
        <div class="current-number" id="num">000</div>
    </div>

    <div class="traveler-box">
        <span style="color:#fff; font-weight:bold;">輸入您的抽獎號碼</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="saveMyNum()">
        <div id="saveStatus" style="color:#2ecc71; font-size:0.8rem; margin-top:8px; opacity:0;">✓ 自動提醒已開啟</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;

        // 啟動音訊與權限
        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("提醒系統已就緒");
            u.lang = "zh-TW";
            synth.speak(u);
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        // 關閉提醒
        function closeMatchModal() {
            document.getElementById('matchModal').style.display = 'none';
            synth.cancel();
        }

        // 儲存號碼
        function saveMyNum() {
            const val = document.getElementById('myNumInput').value;
            localStorage.setItem('hihigh_num', val);
            const status = document.getElementById('saveStatus');
            status.style.opacity = "1";
            setTimeout(() => status.style.opacity = "0", 2000);
        }

        window.onload = () => {
            const saved = localStorage.getItem('hihigh_num');
            if(saved) document.getElementById('myNumInput').value = saved;
        };

        // 監聽叫號
        let lastTimestamp = 0;
        db.ref('call_data').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            // 更新背景
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;
            
            // 檢查是否為新叫號
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                const newNum = parseInt(data.number);
                document.getElementById('num').innerText = newNum.toString().padStart(3, '0');
                
                // 執行提醒邏輯
                handleAlert(data);
            }
        });

        function handleAlert(data) {
            const isMobile = window.innerWidth <= 1024;
            const myNum = parseInt(document.getElementById('myNumInput').value);
            const currentNum = parseInt(data.number);

            // 號碼匹配判斷
            if (!isNaN(myNum) && myNum === currentNum) {
                // 1. 顯示強制彈窗
                const modal = document.getElementById('matchModal');
                document.getElementById('modalNumShow').innerText = currentNum.toString().padStart(3, '0');
                modal.style.display = 'flex';

                // 2. 執行震動 (Android 支援)
                if (navigator.vibrate) {
                    navigator.vibrate([500, 200, 500, 200, 800]);
                }

                // 3. 專屬語音提醒
                const alertVoice = new SpeechSynthesisUtterance("旅人您好，您的號碼到了，請準備搭乘");
                alertVoice.lang = "zh-TW";
                synth.speak(alertVoice);
            }

            // 如果是大螢幕看板，或者是匹配的手機，才繼續廣播語音
            if (!isMobile || (!isNaN(myNum) && myNum === currentNum)) {
                broadcast(data);
            }
        }

        function broadcast(data) {
            // 延遲語音，避免跟提醒語音重疊
            setTimeout(() => {
                const confs = [
                    {k:'zh', t:`請第 ${data.number} 號旅人準備搭乘`, l:'zh-TW'},
                    {k:'en', t:`Number ${data.number}, please prepare`, l:'en-US'},
                    {k:'jp', t:`${data.number} 番の旅人様、ご準備ください`, l:'ja-JP'}
                ];
                confs.forEach(c => {
                    const setting = data.langs[c.k];
                    if(setting && setting.enabled) {
                        for(let i=0; i<setting.repeat; i++) {
                            const u = new SpeechSynthesisUtterance(c.t);
                            u.lang = c.l;
                            synth.speak(u);
                        }
                    }
                });
            }, 1000);
        }
    </script>
</body>
</html>
