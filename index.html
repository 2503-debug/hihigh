<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所 - 專業雲端看板</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --brand-cyan: #00d2ff; 
            --accent-gold: #f1c40f; 
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* 修正後的背景樣式：確保圖片固定且不變形 */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100%; 
            overflow-x: hidden; background: #000; 
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover; /* 確保鋪滿 */
            background-attachment: fixed; /* 修正：背景固定，不隨頁面亂跑 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: background-image 0.5s ease-in-out;
        }

        /* 強力提醒彈窗 */
        #matchModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 38, 38, 0.98);
            z-index: 99999; display: none; flex-direction: column;
            align-items: center; justify-content: center; color: white;
            text-align: center; animation: modalFlash 0.5s infinite alternate;
            padding: 20px; box-sizing: border-box;
        }
        @keyframes modalFlash { from { background: rgba(220, 38, 38, 0.98); } to { background: rgba(0, 0, 0, 0.98); } }
        #matchModal h1 { font-size: 10vw; margin: 0; font-weight: 900; }
        #matchModal .modal-num { font-size: 35vw; font-family: 'Montserrat'; font-weight: 900; color: var(--accent-gold); line-height: 1; }
        #matchModal .close-btn { background: white; color: black; padding: 18px 60px; border-radius: 100px; font-weight: 900; font-size: 6vw; border: none; margin-top: 40px; }

        /* 主面板 */
        .display-panel {
            text-align: center; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 85%; max-width: 850px; padding: 50px 40px; border-radius: 40px; border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 10;
        }
        .current-number { font-family: 'Montserrat', sans-serif; font-size: 15vw; font-weight: 900; color: var(--accent-gold); line-height: 1; }

        /* 底部數據資訊：復原已抽號碼 */
        .stat-bar {
            position: fixed; bottom: 30px; width: 90%; display: flex; justify-content: space-between; align-items: flex-end; z-index: 20;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 15px 25px; 
            border-radius: 25px; border: 1px solid var(--glass-border); color: white;
        }
        .stat-label { font-size: 0.8rem; color: #cbd5e1; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--brand-cyan); font-family: 'Montserrat'; }

        /* 手機版號碼輸入 */
        .traveler-box {
            display: none; flex-direction: column; align-items: center;
            width: 85%; background: var(--glass); padding: 25px; border-radius: 30px;
            border: 1px solid var(--glass-border); margin-top: 30px; z-index: 10;
        }
        .traveler-box input {
            width: 150px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid var(--brand-cyan);
            color: var(--brand-cyan); font-size: 3rem; font-family: 'Montserrat'; font-weight: 900;
            text-align: center; border-radius: 20px; outline: none; margin-top: 15px;
        }

        #audioUnlockBtn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: #27ae60; color: white; border: none; padding: 12px 20px;
            border-radius: 50px; font-weight: 900; cursor: pointer;
        }

        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 80px; }
            .display-panel { width: 90%; padding: 30px 10px; }
            .current-number { font-size: 30vw; }
            .traveler-box { display: flex; }
            .stat-bar { bottom: 20px; flex-direction: row; }
        }
    </style>
</head>
<body id="bgBody">

    <div id="matchModal">
        <h1>您的號碼到了！</h1>
        <p>請前往櫃台搭乘</p>
        <div class="modal-num" id="modalNumShow">000</div>
        <button class="close-btn" onclick="closeMatchModal()">我知道了</button>
    </div>

    <button id="audioUnlockBtn" onclick="unlockAudio()">🔊 啟動叫號提醒</button>
    
    <div class="display-panel">
        <div style="font-size:2rem; color:#cbd5e1; margin-bottom:10px; font-weight:700;">目前叫號</div>
        <div class="current-number" id="num">000</div>
    </div>

    <div class="traveler-box">
        <span style="color:#fff; font-weight:bold;">輸入您的抽獎號碼</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="saveMyNum()">
    </div>

    <div class="stat-bar">
        <div class="stat-item">
            <span class="stat-label">目前已發放號碼</span>
            <span class="stat-value" id="uiTotalIssued">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">在線等待人數</span>
            <span class="stat-value" id="uiOnlineCount">0</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        const myId = Math.random().toString(36).substring(7);

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("系統就緒");
            u.lang = "zh-TW"; synth.speak(u);
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        function closeMatchModal() {
            document.getElementById('matchModal').style.display = 'none';
            synth.cancel();
        }

        function saveMyNum() {
            const val = document.getElementById('myNumInput').value;
            localStorage.setItem('hihigh_num', val);
            updateOnlineStatus();
        }

        function updateOnlineStatus() {
            const isMobile = window.innerWidth <= 1024;
            const myNum = document.getElementById('myNumInput').value;
            if (isMobile && myNum !== "") {
                db.ref('traveler_stats/' + myId).set({
                    role: 'mobile',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
        }
        db.ref('traveler_stats/' + myId).onDisconnect().remove();

        // 監聽在線人數
        db.ref('traveler_stats').on('value', snap => {
            const list = snap.val() || {};
            const count = Object.values(list).filter(item => item.role === 'mobile').length;
            document.getElementById('uiOnlineCount').innerText = count;
        });

        // 監聽已發放號碼
        db.ref('issue_stats/totalIssued').on('value', snap => {
            document.getElementById('uiTotalIssued').innerText = snap.val() || 0;
        });

        window.onload = () => {
            const saved = localStorage.getItem('hihigh_num');
            if(saved) document.getElementById('myNumInput').value = saved;
            updateOnlineStatus();
        };

        let lastTimestamp = 0;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;

            // 背景更新修正
            if (data.bg) {
                document.body.style.backgroundImage = `url(${data.bg})`;
            }
            
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                const newNum = parseInt(data.number);
                document.getElementById('num').innerText = newNum.toString().padStart(3, '0');
                handleAlert(data);
            }
        });

        function handleAlert(data) {
            const myNum = parseInt(document.getElementById('myNumInput').value);
            const currentNum = parseInt(data.number);

            if (!isNaN(myNum) && myNum === currentNum) {
                document.getElementById('modalNumShow').innerText = currentNum.toString().padStart(3, '0');
                document.getElementById('matchModal').style.display = 'flex';
                if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 800]);
            }
            
            // 語音播放邏輯 (略，與之前相同)...
            broadcast(data);
        }

        function broadcast(data) {
            // ... (維持之前的多國語音邏輯)
            const confs = [
                {k:'zh', t:`請第 ${data.number} 號旅人準備搭乘`, l:'zh-TW'},
                {k:'en', t:`Number ${data.number}, please prepare`, l:'en-US'},
                {k:'jp', t:`${data.number} 番の旅人様、ご準備ください`, l:'ja-JP'}
            ];
            confs.forEach(c => {
                const setting = data.langs[c.k];
                if(setting && setting.enabled) {
                    for(let i=0; i<setting.repeat; i++) {
                        const u = new SpeechSynthesisUtterance(c.t);
                        u.lang = c.l; synth.speak(u);
                    }
                }
            });
        }
    </script>
</body>
</html>
