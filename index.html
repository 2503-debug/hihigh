<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所</title>
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --ios-bg: #0f172a;
            --ios-glass: rgba(255, 255, 255, 0.12);
            --ios-accent: #00d2ff;
            --ios-yellow: #ffcc00;
            --ios-green: #34c759;
            --apple-radius: 30px;
            --marquee-height: 100px; 
            /* 修正：更換為薰衣草紫 */
            --ios-purple: rgba(147, 112, 219, 0.95); 
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans TC", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center;
            overflow-x: hidden;
            background-size: cover; background-position: center;
        }

        #infoBar {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--marquee-height);
            background: var(--ios-purple); 
            backdrop-filter: blur(20px);
            z-index: 2000; display: none; overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        #marquee { 
            line-height: var(--marquee-height); 
            white-space: nowrap; 
            font-size: 3.5rem; 
            font-weight: 900; 
            display: inline-block;
            padding-bottom: 5px; 
            animation: scrollText 18s linear infinite; 
            color: #ffffff; /* 確保白色文字在薰衣草紫上清晰 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        @keyframes scrollText { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        body.has-marquee { padding-top: var(--marquee-height); }

        .system-title { 
            font-size: 2.2rem; font-weight: 900; margin: 15px 0; text-align: center;
            background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .display-panel { 
            text-align: center; background: var(--ios-glass); 
            backdrop-filter: blur(30px) saturate(180%); 
            width: 90%; max-width: 900px; 
            padding: 30px 15px; border-radius: var(--apple-radius); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 10; 
        }

        .panel-header { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .label-en { font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; color: #94a3b8; }
        .label-zh { font-size: 1.5rem; font-weight: 900; color: #fff; }

        .current-number { 
            font-size: 9rem; font-weight: 900; color: var(--ios-yellow); 
            line-height: 1.1; margin: 10px 0;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.4));
        }

        .is-range { font-size: 5.5rem !important; }

        .panel-footer { margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .footer-zh { font-size: 1.8rem; font-weight: 900; color: #fff; display: block; } 
        .footer-en { font-size: 0.9rem; font-weight: 400; color: #94a3b8; margin-top: 5px; display: block; }

        .traveler-input-box { 
            display: flex; flex-direction: column; align-items: center; 
            margin-top: 25px; width: 90%; max-width: 450px; z-index: 20; 
        }
        .setup-guide {
            background: rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 15px;
            margin-bottom: 20px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box;
        }
        .guide-title { color: var(--ios-yellow); font-weight: 700; text-align: center; margin-bottom: 8px; font-size: 1rem; }
        .guide-text { font-size: 0.85rem; color: #cbd5e1; line-height: 1.5; }
        .highlight-green { color: var(--ios-green); font-weight: 700; }
        .highlight-red { color: #ff3b30; font-weight: 700; }

        .traveler-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; color: #94a3b8; display: block; }
        .num-in { 
            width: 160px; height: 70px; background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.2); color: var(--ios-accent); 
            font-size: 3rem; text-align: center; border-radius: 20px; outline: none; 
        }

        .stat-container { display: flex; gap: 10px; margin-top: 25px; z-index: 100; }
        .stat-pill { background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 40px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-weight: 900; color: var(--ios-accent); margin-left: 4px; }

        #audioBtn { 
            position: fixed; bottom: 20px; right: 20px; z-index: 1001; 
            background: var(--ios-green); color: white; border: none; padding: 12px 24px; 
            border-radius: 30px; font-weight: 700; box-shadow: 0 8px 20px rgba(52, 199, 89, 0.3); 
            cursor: pointer;
        }

        @media screen and (min-width: 1025px) {
            :root { --marquee-height: 120px; }
            #marquee { font-size: 4.5rem; } 
            .system-title { font-size: 3.2rem; margin: 30px 0; }
            .display-panel { max-width: 1100px; padding: 60px 40px; }
            .current-number { font-size: 22rem; }
            .label-zh { font-size: 3rem; }
            .footer-zh { font-size: 4rem; }
            .footer-en { font-size: 1.8rem; }
            .is-range { font-size: 13rem !important; }
            .traveler-input-box { display: none; }
        }

        @media screen and (max-width: 600px) {
            :root { --marquee-height: 60px; } 
            #marquee { font-size: 1.8rem; line-height: 60px; } 
            .current-number { font-size: 7.5rem; }
            .is-range { font-size: 4.5rem !important; }
            .footer-zh { font-size: 1.5rem; }
        }

        #matchModal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #ff3b30; z-index: 9999; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body id="bgBody">

    <div id="infoBar"><div id="marquee"><span id="msgContent"></span></div></div>

    <div id="matchModal">
        <div style="font-size: 1.8rem; font-weight: 900; margin-bottom: 20px;">到您的號碼了</div>
        <div style="font-size: 25vw; font-weight: 900; color: #fff;" id="modalShow">000</div>
        <p style="font-size: 1.4rem; font-weight: 700; margin-top: 20px;">請至櫃檯準備購票</p>
        <button onclick="closeModal()" style="background:white; color:black; border:none; padding:15px 50px; border-radius:35px; font-size:1.3rem; font-weight:700; margin-top:30px; cursor:pointer;">關閉提醒</button>
    </div>

    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel">
        <div class="panel-header">
            <span class="label-en">CURRENT NUMBER</span>
            <span class="label-zh">目前叫號</span>
        </div>
        <div class="current-number" id="num">000</div>
        <div class="panel-footer">
            <span class="footer-zh">請至櫃檯準備購票</span>
            <span class="footer-en">Please Proceed to the Ticket Counter</span>
        </div>
    </div>

    <div class="traveler-input-box" id="mobileInputArea">
        <div class="setup-guide">
            <div class="guide-title">⚙️ 背景提醒設定指南</div>
            <div class="guide-text">
                • 點擊右下角 <span class="highlight-green">啟動語音</span><br>
                • iPhone 請關閉 <span class="highlight-red">側邊靜音鍵</span><br>
                • 建議不要關閉此網頁，以利背景接收通知
            </div>
        </div>
        <span class="traveler-label">輸入號碼牌到號通知</span>
        <input type="number" id="myNum" class="num-in" placeholder="000" oninput="saveNum()">
        <div id="inputStatusText" style="color:var(--ios-yellow); margin-top:12px; font-weight:700; font-size: 1rem;"></div>
    </div>

    <div class="stat-container">
        <div class="stat-pill">已發票數<span id="totalIssued" class="stat-value">0</span></div>
        <div class="stat-pill">在線旅人<span id="onlineCount" class="stat-value">0</span></div>
    </div>

    <button id="audioBtn" onclick="initAudio()">🔊 啟動語音提醒</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let emergencyTimer = null;
        let lastTs = 0;
        const myId = Math.random().toString(36).substring(7);

        function initAudio() {
            const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==');
            silentAudio.loop = true; silentAudio.play().catch(()=>{});
            synth.cancel();
            const u = new SpeechSynthesisUtterance("系統已就緒");
            u.lang = 'zh-TW'; synth.speak(u);
            document.getElementById('audioBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('matchModal').style.display = 'none';
            stopEmergencyAlert();
        }

        function saveNum() {
            const val = document.getElementById('myNum').value;
            localStorage.setItem('hihigh_num', val);
            document.getElementById('inputStatusText').innerText = val !== "" ? `✅ 已鎖定第 ${val} 號` : "";
            updateTravelerStatus();
        }

        function updateTravelerStatus() {
            const val = document.getElementById('myNum').value;
            if (val !== "") db.ref('traveler_stats/' + myId).set({ role: 'mobile', ts: Date.now() });
            else db.ref('traveler_stats/' + myId).remove();
        }
        db.ref('traveler_stats/' + myId).onDisconnect().remove();

        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
            
            if (data.message) {
                document.getElementById('msgContent').innerText = data.message + "　　　" + data.message;
                document.getElementById('infoBar').style.display = "block";
                document.body.classList.add('has-marquee');
            } else { 
                document.getElementById('infoBar').style.display = "none";
                document.body.classList.remove('has-marquee');
            }

            if (data.timestamp > lastTs) {
                lastTs = data.timestamp;
                const rawNum = String(data.number || "0"); 
                const numDisplay = document.getElementById('num');
                
                if (rawNum.includes('-')) {
                    numDisplay.classList.add('is-range');
                    numDisplay.innerText = rawNum;
                } else {
                    numDisplay.classList.remove('is-range');
                    numDisplay.innerText = rawNum.padStart(3, '0');
                }
                
                const myInput = document.getElementById('myNum').value;
                const myNumVal = parseInt(myInput);
                let isMatch = false;

                if (rawNum.includes('-')) {
                    const [start, end] = rawNum.split('-').map(Number);
                    if (!isNaN(myNumVal) && myNumVal >= start && myNumVal <= end) isMatch = true;
                } else {
                    if (!isNaN(myNumVal) && myNumVal === parseInt(rawNum)) isMatch = true;
                }

                const isMobile = window.innerWidth <= 1024;
                if (isMatch && isMobile) {
                    startEmergencyAlert(rawNum);
                } else {
                    stopEmergencyAlert();
                    if (!isMobile || (isMobile && isNaN(myNumVal))) {
                        playAdminVoices(rawNum, data.langs || {});
                    }
                }
            }
        });

        function formatVoiceNum(str) {
            if (str.includes('-')) {
                return str.split('-').map(n => parseInt(n)).join('到');
            }
            return parseInt(str);
        }

        function playAdminVoices(numStr, langs) {
            synth.cancel();
            const voiceNumZh = formatVoiceNum(numStr);
            const voiceNumEn = numStr.includes('-') ? numStr.split('-').map(n => parseInt(n)).join(' to ') : parseInt(numStr);

            const voiceList = ['zh', 'en', 'jp'];
            voiceList.forEach(lKey => {
                const conf = langs[lKey];
                if (conf && conf.enabled) {
                    for (let i = 0; i < (conf.repeat || 1); i++) {
                        let txt = "";
                        if(lKey === 'zh') txt = `請號碼 ${voiceNumZh} 的旅人準備購票`;
                        if(lKey === 'en') txt = `Number ${voiceNumEn}, please proceed to the ticket counter.`;
                        if(lKey === 'jp') txt = `${voiceNumZh} 番のお客様、チケットカウンターまでお越しください。`;
                        const u = new SpeechSynthesisUtterance(txt);
                        u.lang = lKey==='zh'?'zh-TW':(lKey==='en'?'en-US':'ja-JP');
                        synth.speak(u);
                    }
                }
            });
        }

        function startEmergencyAlert(numStr) {
            stopEmergencyAlert();
            document.getElementById('modalShow').innerText = numStr.includes('-') ? numStr : numStr.padStart(3, '0');
            document.getElementById('matchModal').style.display = 'flex';
            const voiceNum = formatVoiceNum(numStr);
            const alarm = () => {
                const u = new SpeechSynthesisUtterance(`請旅人 ${voiceNum} 號至櫃台準備購票。`);
                u.lang = 'zh-TW'; synth.speak(u);
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            };
            alarm();
            emergencyTimer = setInterval(alarm, 7000);
        }

        function stopEmergencyAlert() {
            if (emergencyTimer) { clearInterval(emergencyTimer); emergencyTimer = null; }
            synth.cancel();
            if (navigator.vibrate) navigator.vibrate(0);
        }

        db.ref('traveler_stats').on('value', snap => {
            const count = Object.keys(snap.val() || {}).length;
            document.getElementById('onlineCount').innerText = count;
        });
        db.ref('issue_stats/totalIssued').on('value', snap => {
            const count = snap.val() || 0;
            document.getElementById('totalIssued').innerText = count;
        });

        window.onload = () => {
            const saved = localStorage.getItem('hihigh_num') || "";
            document.getElementById('myNum').value = saved;
            if(saved !== "") document.getElementById('inputStatusText').innerText = `✅ 已鎖定第 ${saved} 號`;
            updateTravelerStatus();
        };
    </script>
</body>
</html>
