<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所 - 專業雲端看板</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* 1. 基礎佈局：完全復原至最穩定的看板模式 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 2. 跑馬燈：恢復最原始穩定的置頂邏輯 */
        #infoBar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(231, 76, 60, 0.9); backdrop-filter: blur(10px);
            color: white; line-height: 60px; z-index: 999; display: none; overflow: hidden;
        }
        #marquee { 
            position: absolute; white-space: nowrap; font-size: 2rem; font-weight: 900; 
            animation: scrollText 12s linear infinite; 
        }
        @keyframes scrollText { 
            from { transform: translateX(100%); } 
            to { transform: translateX(-100%); } 
        }

        /* 3. 抬頭標題：復原位置與發光 */
        .system-title { 
            font-size: 3rem; font-weight: 900; color: white; 
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.8); 
            margin-bottom: 30px; z-index: 10;
        }

        /* 4. 看板面板：恢復標準大螢幕比例 */
        .display-panel {
            text-align: center; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 80%; max-width: 900px; padding: 60px 40px; border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 10;
        }
        .current-number { font-family: 'Montserrat', sans-serif; font-size: 15rem; font-weight: 900; color: #f1c40f; line-height: 1; }

        /* 5. 統計數據：恢復舊版左下角整潔排版 */
        .stat-container {
            position: fixed; bottom: 30px; left: 30px; display: flex; gap: 20px; z-index: 100;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.6); padding: 15px 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); color: white;
        }
        .stat-label { font-size: 0.9rem; color: #cbd5e1; display: block; }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: #00d2ff; font-family: 'Montserrat'; }

        /* 6. 強力提醒層：作為獨立外掛層，不影響佈局 */
        #matchModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 38, 38, 0.98); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; animation: modalFlash 0.5s infinite alternate;
        }
        @keyframes modalFlash { from { background: #dc2626; } to { background: #000; } }
        #matchModal .modal-num { font-size: 30vw; font-family: 'Montserrat'; font-weight: 900; color: #f1c40f; }

        /* 7. 啟動按鈕：右下角 */
        #audioBtn {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            background: #27ae60; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 手機版自動切換佈局 */
        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 100px; }
            .system-title { font-size: 2rem; }
            .display-panel { width: 90%; padding: 40px 10px; }
            .current-number { font-size: 8rem; }
            .stat-container { bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; justify-content: center; }
            .traveler-box { display: flex !important; flex-direction: column; align-items: center; margin-top: 30px; }
            .traveler-box input { width: 150px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid #00d2ff; color: #00d2ff; font-size: 3rem; text-align: center; border-radius: 20px; margin-top: 10px; font-family: 'Montserrat'; }
        }
    </style>
</head>
<body id="bgBody">

    <div id="infoBar"><div id="marquee"><span id="msgContent"></span></div></div>

    <div id="matchModal">
        <h1 style="font-size: 8vw;">您的號碼到了！</h1>
        <div class="modal-num" id="modalShow">000</div>
        <button onclick="closeModal()" style="padding: 15px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; margin-top: 20px;">我知道了</button>
    </div>

    <button id="audioBtn" onclick="initAudio()">🔊 啟動語音系統</button>
    
    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel">
        <div style="font-size: 2rem; color: #cbd5e1; margin-bottom: 10px;">目前叫號</div>
        <div class="current-number" id="num">000</div>
    </div>

    <div class="traveler-box" style="display:none; z-index: 10;">
        <span style="color:#fff; font-weight:bold;">輸入您的號碼啟動提醒</span>
        <input type="number" id="myNum" placeholder="---" oninput="saveNum()">
    </div>

    <div class="stat-container">
        <div class="stat-item">
            <span class="stat-label">已發放號碼</span>
            <span id="totalIssued" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">在線人數</span>
            <span id="onlineCount" class="stat-value">0</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        const myId = Math.random().toString(36).substring(7);

        function initAudio() {
            const u = new SpeechSynthesisUtterance(""); synth.speak(u);
            document.getElementById('audioBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('matchModal').style.display = 'none';
            synth.cancel();
        }

        function saveNum() {
            localStorage.setItem('hihigh_num', document.getElementById('myNum').value);
            updateStatus();
        }

        function updateStatus() {
            const val = document.getElementById('myNum').value;
            if (window.innerWidth <= 1024 && val !== "") {
                db.ref('traveler_stats/' + myId).set({ role: 'mobile', ts: Date.now() });
            }
        }
        db.ref('traveler_stats/' + myId).onDisconnect().remove();

        // 數據監聽
        db.ref('traveler_stats').on('value', snap => {
            document.getElementById('onlineCount').innerText = Object.keys(snap.val() || {}).length;
        });
        db.ref('issue_stats/totalIssued').on('value', snap => {
            document.getElementById('totalIssued').innerText = snap.val() || 0;
        });

        window.onload = () => {
            document.getElementById('myNum').value = localStorage.getItem('hihigh_num') || "";
            updateStatus();
        };

        let lastTs = 0;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            
            // 背景圖
            if (data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
            
            // 跑馬燈內容與控制
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgContent').innerText = data.message + "　　　　　" + data.message;
                document.getElementById('infoBar').style.display = "block";
            } else {
                document.getElementById('infoBar').style.display = "none";
            }

            if (data.timestamp > lastTs) {
                lastTs = data.timestamp;
                const n = parseInt(data.number);
                document.getElementById('num').innerText = n.toString().padStart(3, '0');
                
                // 強力提醒比對邏輯 (不影響視覺)
                const my = parseInt(document.getElementById('myNum').value);
                if (!isNaN(my) && my === n) {
                    document.getElementById('modalShow').innerText = n.toString().padStart(3, '0');
                    document.getElementById('matchModal').style.display = 'flex';
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                }
                
                // 語音廣播
                if (window.innerWidth > 1024 || (!isNaN(my) && my === n)) {
                    broadcast(data);
                }
            }
        });

        function broadcast(data) {
            setTimeout(() => {
                const confs = [{k:'zh', t:`請第 ${data.number} 號準備`, l:'zh-TW'}, {k:'en', t:`Number ${data.number}`, l:'en-US'}, {k:'jp', t:`${data.number} 番`, l:'ja-JP'}];
                confs.forEach(c => {
                    const s = data.langs[c.k];
                    if(s && s.enabled) {
                        for(let i=0; i<s.repeat; i++) {
                            const u = new SpeechSynthesisUtterance(c.t); u.lang = c.l; synth.speak(u);
                        }
                    }
                });
            }, 800);
        }
    </script>
</body>
</html>
