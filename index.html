<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hi&High 飛翔提案所 - 頂級雲端看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-cyan: #00d2ff; 
            --brand-blue: #3a7bd5;
            --accent-gold: #f1c40f; 
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; background: #000; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0f172a, #1e40af);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 1; pointer-events: none; }

        /* 跑馬燈 */
        #infoBar {
            position: fixed; top: 15px; width: 94%; left: 3%;
            background: rgba(231, 76, 60, 0.9);
            backdrop-filter: blur(10px);
            color: white; height: 45px; line-height: 45px;
            z-index: 100; display: none; overflow: hidden;
            border-radius: 50px; box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }
        #marquee { position: absolute; white-space: nowrap; font-size: 1.2rem; font-weight: 900; animation: scrollText 20s linear infinite; }

        /* 主標題 */
        .system-title {
            font-size: 2.8vw; font-weight: 900; margin-bottom: 20px;
            letter-spacing: 0.8vw; color: white;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.8);
            z-index: 10;
        }

        /* 玻璃面板 */
        .display-panel {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 70%; max-width: 850px;
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .label { font-size: 1.8vw; color: #cbd5e1; margin-bottom: 15px; letter-spacing: 2px; font-weight: 700; }
        
        .current-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 15vw; font-weight: 900;
            color: var(--accent-gold);
            line-height: 1;
            text-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 電腦版等候狀態 (浮動在右下) */
        .waiting-status {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 15px 25px; border-radius: 25px;
            border: 1px solid var(--glass-border);
            color: white; z-index: 100;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .waiting-count { font-size: 2rem; font-weight: 900; color: var(--brand-cyan); font-family: 'Montserrat'; }

        /* 手機版適應優化 */
        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 80px; overflow-y: auto; }
            .system-title { font-size: 8vw; margin-bottom: 20px; }
            .display-panel { width: 88%; padding: 40px 15px; }
            .current-number { font-size: 32vw; }
            .label { font-size: 5vw; }

            /* 手機版等候狀態：取消固定定位，移至下方 */
            .waiting-status {
                position: relative; 
                bottom: 0; right: 0;
                margin: 20px auto; 
                width: 80%;
                text-align: center;
                animation: fadeInUp 1s ease-out;
            }
            .waiting-count { font-size: 1.8rem; }

            .traveler-box {
                display: flex !important; flex-direction: column; align-items: center;
                margin: 10px auto 40px; width: 88%;
                background: var(--glass); backdrop-filter: blur(10px);
                padding: 20px; border-radius: 30px; border: 1px solid var(--glass-border);
                z-index: 20;
            }
            .traveler-box input {
                width: 140px; height: 65px; background: rgba(0,0,0,0.5);
                border: 2px solid var(--brand-cyan); color: var(--brand-cyan);
                font-size: 2.5rem; font-family: 'Montserrat'; font-weight: 900;
                text-align: center; border-radius: 15px;
            }
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scrollText { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .matched-alert { animation: pulseMatched 1s infinite alternate !important; border-color: #ff4757 !important; }
        @keyframes pulseMatched { from { box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); } to { box-shadow: 0 0 50px rgba(255, 71, 87, 0.8); transform: scale(1.02); } }
    </style>
</head>
<body id="bgBody">

    <button id="audioUnlockBtn" onclick="unlockAudio()" style="position:fixed; bottom:20px; left:20px; z-index:9999; background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:50px; cursor:pointer; font-size:0.8rem; font-weight:900; opacity: 0.8;">🔊 啟動語音</button>

    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    <div class="bg-overlay"></div>
    
    <div class="system-title">Hi&High 飛翔提案所</div>
    
    <div class="display-panel" id="mainPanel">
        <div class="label">NOW CALLING</div>
        <div class="current-number" id="num">000</div>
        <div class="label" style="margin-top:15px; font-size:1.2vw; color:var(--brand-cyan); font-weight:500;">請旅人準備登機</div>
    </div>

    <div class="waiting-status">
        <div style="font-size:0.8rem; color:#94a3b8;">ON BOARDING</div>
        <span class="waiting-count" id="uiWaitingCount">0</span>
        <div style="border-top:1px solid rgba(255,255,255,0.1); margin-top:8px; padding-top:8px; font-size:0.8rem; color:#fff;">
            ISSUED: <span id="uiTotalIssued" style="color:var(--accent-gold); font-weight:bold;">0</span>
        </div>
    </div>

    <div class="traveler-box">
        <span style="font-size:0.9rem; font-weight:bold; color:#fff; margin-bottom:10px;">YOUR NUMBER</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="triggerFeedback()">
        <div id="saveStatus" style="opacity:0; color:#2ecc71; font-size:0.7rem; margin-top:5px;">✓ AUTO NOTIFY ENABLED</div>
    </div>

    <script>
        // Firebase 與 邏輯部分保持不變
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        const myId = Math.random().toString(36).substring(7);
        const travelerRef = db.ref('traveler_stats/' + myId);

        function updateOnlineStatus() {
            const isMobile = window.innerWidth <= 1024;
            const myNum = document.getElementById('myNumInput').value;
            if (isMobile && myNum !== "") { travelerRef.set({ isWaiting: true, timestamp: firebase.database.ServerValue.TIMESTAMP }); }
            else { travelerRef.remove(); }
        }
        travelerRef.onDisconnect().remove();

        db.ref('traveler_stats').on('value', snap => { document.getElementById('uiWaitingCount').innerText = Object.keys(snap.val() || {}).length; });
        db.ref('issue_stats/totalIssued').on('value', snap => { document.getElementById('uiTotalIssued').innerText = snap.val() || 0; });

        function triggerFeedback() {
            localStorage.setItem('hihigh_num', document.getElementById('myNumInput').value);
            updateOnlineStatus();
            document.getElementById('saveStatus').style.opacity = "1";
            setTimeout(() => { document.getElementById('saveStatus').style.opacity = "0"; }, 2000);
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("OK");
            u.lang = "en-US"; synth.speak(u);
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        window.onload = () => {
            if(localStorage.getItem('hihigh_num')) document.getElementById('myNumInput').value = localStorage.getItem('hihigh_num');
            updateOnlineStatus();
        };

        let lastTimestamp = 0;
        let isSpeaking = false;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;
            const bar = document.getElementById('infoBar');
            if (data.message && data.message.trim() !== "") {
                document.getElementById('msgText').innerText = data.message + "　　　　　";
                bar.style.display = "block";
            } else { bar.style.display = "none"; }
            
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                const numEl = document.getElementById('num');
                numEl.style.transform = "scale(1.1)";
                setTimeout(() => {
                    numEl.innerText = data.number.toString().padStart(3, '0');
                    numEl.style.transform = "scale(1)";
                }, 150);
                if (data.updateType === 'num') handleVoiceCall(data);
            }
        });

        function handleVoiceCall(data) {
            synth.cancel(); isSpeaking = false;
            const isBigScreen = window.innerWidth > 1024;
            const myNum = document.getElementById('myNumInput').value;
            const isMatched = (myNum && parseInt(myNum) === data.number);
            if (!isBigScreen && !isMatched) return;

            setTimeout(() => {
                if (isSpeaking) return; isSpeaking = true;
                let queue = []; const voices = synth.getVoices();
                if (isMatched) {
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                    document.getElementById('mainPanel').classList.add('matched-alert');
                    setTimeout(() => document.getElementById('mainPanel').classList.remove('matched-alert'), 10000);
                    const m = new SpeechSynthesisUtterance("您的號碼到了"); m.lang = "zh-TW"; queue.push(m);
                }
                const conf = [{k:'zh',t:`請第 ${data.number} 號旅人準備搭乘`,l:'zh-TW'},{k:'en',t:`Number ${data.number}`,l:'en-US'},{k:'jp',t:`${data.number} 番の旅人様`,l:'ja-JP'}];
                conf.forEach(c => { if(data.langs[c.k].enabled) { const u = new SpeechSynthesisUtterance(c.t); u.voice = voices.find(v => v.name === data.langs[c.k].voice); u.lang = c.l; queue.push(u); } });
                const play = (i) => { if (i >= queue.length) { isSpeaking = false; return; } queue[i].onend = () => play(i+1); synth.speak(queue[i]); };
                play(0);
            }, 200);
        }
    </script>
</body>
</html>
