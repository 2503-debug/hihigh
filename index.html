<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hi&High 飛翔提案所</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        html { height: 100%; }
        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a; background-position: center center;
            background-repeat: no-repeat; background-size: cover; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow-x: hidden; overflow-y: auto;
        }

        #infoBar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(231, 76, 60, 0.95); backdrop-filter: blur(10px);
            color: white; line-height: 60px; z-index: 1000; display: none; overflow: hidden;
        }
        #marquee { position: absolute; white-space: nowrap; font-size: 1.8rem; font-weight: 900; animation: scrollText 10s linear infinite; }
        @keyframes scrollText { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }

        .system-title { 
            font-size: 3.5rem; font-weight: 900; color: white; 
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.8); 
            margin: 30px 15px 20px 15px; z-index: 10; text-align: center;
            white-space: nowrap;
        }

        .display-panel { 
            text-align: center; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); width: 80%; max-width: 800px; 
            padding: 50px 40px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); z-index: 10; 
        }

        .current-number { font-family: 'Montserrat', sans-serif; font-size: 18rem; font-weight: 900; color: #f1c40f; line-height: 1; }
        
        .stat-container { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 100; }
        .stat-pill { background: rgba(0, 0, 0, 0.6); padding: 12px 25px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); color: white; display: flex; align-items: center; }
        .stat-label { font-size: 0.9rem; margin-right: 10px; opacity: 0.8; }
        .stat-value { font-size: 2rem; font-weight: 900; color: #00d2ff; font-family: 'Montserrat'; }

        #audioBtn { position: fixed; bottom: 30px; right: 30px; z-index: 1001; background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        
        #matchModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 38, 38, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; animation: flashEffect 0.5s infinite alternate; }
        @keyframes flashEffect { from { background: #dc2626; } to { background: #000; } }
        #matchModal .modal-num { font-size: 35vw; font-family: 'Montserrat'; font-weight: 900; color: #f1c40f; line-height: 1; }
        #inputStatusText { color: #f1c40f; font-weight: bold; margin-top: 10px; font-size: 1.1rem; min-height: 1.5rem; text-align: center; }

        @media screen and (max-width: 1024px) {
            body { justify-content: flex-start; padding-top: 80px; }
            .system-title { font-size: 8vw; margin-top: 10px; margin-bottom: 10px; }
            .display-panel { width: 90%; padding: 30px 10px; border-radius: 30px; }
            .current-number { font-size: 30vw; }
            .traveler-input-box { display: flex !important; flex-direction: column; align-items: center; margin: 25px 0; z-index: 20; }
            .num-in { width: 150px; height: 80px; background: rgba(0,0,0,0.6); border: 3px solid #00d2ff; color: #00d2ff; font-size: 3rem; text-align: center; border-radius: 20px; font-family: 'Montserrat'; outline: none; }
            .stat-container { position: relative; bottom: 0; left: 0; margin: 20px 0 120px 0; width: 90%; justify-content: center; gap: 10px; flex-wrap: wrap; }
            #audioBtn { position: fixed; bottom: 25px; right: 25px; }
        }
    </style>
</head>
<body id="bgBody">

    <div id="infoBar"><div id="marquee"><span id="msgContent"></span></div></div>

    <div id="matchModal">
        <h1 style="font-size: 8vw; margin:0;">您的號碼到了！</h1>
        <div class="modal-num" id="modalShow">000</div>
        <button onclick="closeModal()" style="padding: 15px 50px; border-radius: 100px; font-size: 1.5rem; font-weight: 900; margin-top: 20px;">關閉提醒</button>
    </div>

    <div class="system-title">Hi&High 飛翔提案所</div>
    <div class="display-panel">
        <div style="font-size: 1.2rem; color: #cbd5e1; margin-bottom: 5px; font-weight: bold;">目前叫號</div>
        <div class="current-number" id="num">000</div>
    </div>

    <div class="traveler-input-box" style="display:none;">
        <p style="color:#fff; font-weight:bold; margin-bottom:10px;">輸入您的號碼啟動提醒</p>
        <input type="number" id="myNum" class="num-in" placeholder="---" oninput="saveNum()">
        <div id="inputStatusText"></div>
    </div>

    <div class="stat-container">
        <div class="stat-pill"><span class="stat-label">已發號碼牌</span><span id="totalIssued" class="stat-value">0</span></div>
        <div class="stat-pill"><span class="stat-label">在線旅人</span><span id="onlineCount" class="stat-value">0</span></div>
    </div>

    <button id="audioBtn" onclick="initAudio()">🔊 啟動語音系統</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let voices = [];
        const myId = Math.random().toString(36).substring(7);

        function loadVoices() {
            voices = synth.getVoices();
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function initAudio() {
            const u = new SpeechSynthesisUtterance("語音系統啟動");
            u.lang = 'zh-TW';
            synth.speak(u);
            document.getElementById('audioBtn').style.display = 'none';
        }

        function closeModal() {
            document.getElementById('matchModal').style.display = 'none';
            synth.cancel(); // 關閉彈窗時也停止語音
        }

        function saveNum() {
            const val = document.getElementById('myNum').value;
            localStorage.setItem('hihigh_num', val);
            const statusDiv = document.getElementById('inputStatusText');
            statusDiv.innerText = val !== "" ? `✅ 已鎖定第 ${val} 號，號碼到時將強力提醒` : "";
            updateStatus();
        }

        function updateStatus() {
            const val = document.getElementById('myNum').value;
            const isMobile = window.innerWidth <= 1024;
            if (isMobile && val !== "") {
                db.ref('traveler_stats/' + myId).set({ role: 'mobile', ts: Date.now() });
            } else {
                db.ref('traveler_stats/' + myId).remove();
            }
        }
        
        db.ref('traveler_stats/' + myId).onDisconnect().remove();

        db.ref('traveler_stats').on('value', snap => {
            const travelers = snap.val() || {};
            document.getElementById('onlineCount').innerText = Object.keys(travelers).length;
        });

        db.ref('issue_stats/totalIssued').on('value', snap => {
            document.getElementById('totalIssued').innerText = snap.val() || 0;
        });

        window.onload = () => {
            loadVoices();
            const saved = localStorage.getItem('hihigh_num') || "";
            document.getElementById('myNum').value = saved;
            if(saved !== "") document.getElementById('inputStatusText').innerText = `✅ 已鎖定第 ${saved} 號，號碼到時將強力提醒`;
            updateStatus();
        };

        let lastTs = 0;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
            if (data.message) {
                document.getElementById('msgContent').innerText = data.message + "　　　" + data.message;
                document.getElementById('infoBar').style.display = "block";
            } else { document.getElementById('infoBar').style.display = "none"; }

            if (data.timestamp > lastTs) {
                lastTs = data.timestamp;
                const n = parseInt(data.number);
                document.getElementById('num').innerText = n.toString().padStart(3, '0');
                const my = parseInt(document.getElementById('myNum').value);
                
                const isMatch = !isNaN(my) && my === n;
                
                // --- 關鍵修正：切換新號碼時立即中斷舊語音 ---
                synth.cancel();

                if (isMatch) {
                    document.getElementById('modalShow').innerText = n.toString().padStart(3, '0');
                    document.getElementById('matchModal').style.display = 'flex';
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                } else {
                    // 如果不是匹配號碼，確保關閉之前的提醒視窗（防止管理員快速跳號時手機卡在舊視窗）
                    document.getElementById('matchModal').style.display = 'none';
                }
                
                if (window.innerWidth > 1024 || isMatch) {
                    broadcast(data, isMatch);
                }
            }
        });

        function broadcast(data, isMatch) {
            const num = data.number;
            
            // 號碼匹配的手機端專用提醒
            if (isMatch && window.innerWidth <= 1024) {
                const welcome = new SpeechSynthesisUtterance("已輪到您的號碼。");
                welcome.lang = 'zh-TW';
                welcome.rate = 0.9;
                synth.speak(welcome);
            }

            const config = [
                { k: 'zh', text: `請第 ${num} 號旅人準備搭乘`, lang: 'zh-TW' },
                { k: 'en', text: `Traveler number ${num}, please prepare to board.`, lang: 'en-US' },
                { k: 'jp', text: `旅人番号 ${num} 番、搭乗の準備をしてください。`, lang: 'ja-JP' }
            ];

            // 稍微延遲讓 synth.cancel() 徹底生效
            setTimeout(() => {
                config.forEach(item => {
                    const setting = data.langs[item.k];
                    if (setting && setting.enabled) {
                        for (let i = 0; i < setting.repeat; i++) {
                            const u = new SpeechSynthesisUtterance(item.text);
                            u.lang = item.lang;
                            u.rate = 0.85;
                            const matchedVoice = voices.find(v => v.lang.startsWith(item.lang));
                            if (matchedVoice) u.voice = matchedVoice;
                            synth.speak(u);
                        }
                    }
                });
            }, 100); 
        }
    </script>
</body>
</html>
