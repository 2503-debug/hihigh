<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hi&High 飛翔提案所 - 雲端同步看板</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --brand-light: #00a8ff; --bg-dark: #0f172a; --accent-gold: #f1c40f; --danger: #e74c3c; --success: #27ae60; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); }
        body { font-family: 'PingFang TC', sans-serif; background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.8s ease-in-out; position: relative; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(15, 23, 42, 0.7) 0%, rgba(30, 58, 138, 0.4) 100%); z-index: 1; pointer-events: none; }
        #audioUnlockBtn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; background: var(--success); color: white; border: none; padding: 15px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 70% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }
        
        .waiting-status { position: fixed; bottom: 5%; right: 5%; color: white; z-index: 100; text-align: right; background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .waiting-count { font-size: 2.5rem; font-weight: 900; color: var(--brand-light); }

        #infoBar { position: fixed; top: 3%; width: 90%; left: 5%; background: #ff0000; color: #ffffff; height: 60px; line-height: 60px; z-index: 100; display: none; overflow: hidden; border-radius: 15px; }
        #marquee { position: absolute; white-space: nowrap; font-size: 2.2rem; font-weight: 900; animation: scrollText 15s linear infinite; padding-left: 100%; }
        @keyframes scrollText { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        .system-title { font-size: 3.5vw; font-weight: bold; margin-bottom: 15px; background: linear-gradient(to right, #ffffff, var(--brand-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 10; }
        .display-panel { text-align: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); width: 80%; max-width: 900px; padding: 4vh 2vw; border-radius: 40px; border: 4px solid rgba(0, 168, 255, 0.5); z-index: 10; }
        .label { font-size: 2.5vw; margin-bottom: 10px; color: #f8fafc; font-weight: bold; }
        .current-number { font-size: 16vw; font-weight: 900; color: var(--accent-gold); line-height: 1; }

        .traveler-box { display: none !important; }
        @media screen and (max-width: 1024px) {
            .system-title { font-size: 8vw; } .label { font-size: 6vw; } .current-number { font-size: 32vw; } .display-panel { width: 85%; }
            .waiting-status { bottom: auto; top: 15%; right: 5%; font-size: 0.8rem; padding: 8px 15px; } .waiting-count { font-size: 1.5rem; }
            .traveler-box { display: flex !important; flex-direction: column; align-items: center; margin-top: 30px; z-index: 20; background: rgba(0, 168, 255, 0.2); padding: 20px; border-radius: 25px; border: 2px solid var(--brand-light); color: white; gap: 10px; }
            .traveler-box input { width: 130px; height: 60px; background: #000; border: 3px solid var(--accent-gold); color: var(--accent-gold); font-size: 2.5rem; font-weight: 900; text-align: center; border-radius: 15px; }
        }
        .matched-alert { border-color: var(--danger) !important; box-shadow: 0 0 80px rgba(231, 76, 60, 0.8) !important; animation: flashBorder 0.5s infinite alternate; }
        @keyframes flashBorder { from { border-color: var(--danger); } to { border-color: white; } }
    </style>
</head>
<body id="bgBody">
    <button id="audioUnlockBtn" onclick="unlockAudio()">🔊 啟動語音</button>
    <div id="infoBar"><div id="marquee"><span id="msgText"></span></div></div>
    <div class="bg-overlay"></div>
    <div class="waiting-status">
        <div>候位中：<span class="waiting-count" id="uiWaitingCount">0</span> 人</div>
        <div style="font-size: 1rem; margin-top: 8px; color: #fff; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px;">
            已發券至：<span id="uiTotalIssued" style="color: var(--accent-gold); font-weight: bold; font-size: 1.4rem;">0</span> 號
        </div>
    </div>
    <div class="system-title">Hi&High 飛翔提案所</div>
    <div class="display-panel" id="mainPanel">
        <div class="label">請旅人準備搭乘</div>
        <div class="current-number" id="num">000</div>
    </div>
    <div class="traveler-box">
        <span>輸入您的抽獎號碼</span>
        <input type="number" id="myNumInput" placeholder="---" oninput="triggerFeedback()">
        <div id="saveStatus" style="opacity: 0; color: #27ae60; font-size: 0.9rem;">✓ 已設定提醒</div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        const myId = Math.random().toString(36).substring(7);
        const travelerRef = db.ref('traveler_stats/' + myId);

        function updateOnlineStatus() {
            const isMobile = window.innerWidth <= 1024;
            const myNum = document.getElementById('myNumInput').value;
            if (isMobile && myNum !== "") { travelerRef.set({ isWaiting: true, timestamp: firebase.database.ServerValue.TIMESTAMP }); }
            else { travelerRef.remove(); }
        }
        travelerRef.onDisconnect().remove();

        db.ref('traveler_stats').on('value', snap => { document.getElementById('uiWaitingCount').innerText = Object.keys(snap.val() || {}).length; });
        db.ref('issue_stats/totalIssued').on('value', snap => { document.getElementById('uiTotalIssued').innerText = snap.val() || 0; });

        function triggerFeedback() {
            localStorage.setItem('hihigh_num', document.getElementById('myNumInput').value);
            updateOnlineStatus();
            document.getElementById('saveStatus').style.opacity = "1";
            setTimeout(() => { document.getElementById('saveStatus').style.opacity = "0"; }, 2000);
        }

        function unlockAudio() {
            const u = new SpeechSynthesisUtterance("系統連線成功");
            u.lang = "zh-TW"; synth.speak(u);
            document.getElementById('audioUnlockBtn').style.display = 'none';
        }

        window.onload = () => {
            if(localStorage.getItem('hihigh_num')) document.getElementById('myNumInput').value = localStorage.getItem('hihigh_num');
            updateOnlineStatus();
        };

        let lastTimestamp = 0;
        let isSpeaking = false;
        db.ref('call_data').on('value', snap => {
            const data = snap.val(); if (!data) return;
            if (data.bg) document.getElementById('bgBody').style.backgroundImage = `url(${data.bg})`;
            if (data.message && data.message.trim() !== "") { document.getElementById('msgText').innerText = data.message + "　　　　　"; document.getElementById('infoBar').style.display = "block"; }
            else { document.getElementById('infoBar').style.display = "none"; }
            if (data.timestamp > lastTimestamp) {
                lastTimestamp = data.timestamp;
                document.getElementById('num').innerText = data.number.toString().padStart(3, '0');
                if (data.updateType === 'num') handleVoiceCall(data);
            }
        });

        function handleVoiceCall(data) {
            synth.cancel(); isSpeaking = false;
            const isBigScreen = window.innerWidth > 1024;
            const myNum = document.getElementById('myNumInput').value;
            const isMatched = (myNum && parseInt(myNum) === data.number);
            if (!isBigScreen && !isMatched) return;
            setTimeout(() => {
                if (isSpeaking) return; isSpeaking = true;
                let queue = []; const voices = synth.getVoices();
                if (isMatched) {
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
                    document.getElementById('mainPanel').classList.add('matched-alert');
                    setTimeout(() => document.getElementById('mainPanel').classList.remove('matched-alert'), 10000);
                    const m = new SpeechSynthesisUtterance("旅人您好，您的號碼到了"); m.lang = "zh-TW"; queue.push(m);
                }
                const conf = [{k:'zh',t:`請第 ${data.number} 號旅人準備搭乘`,l:'zh-TW'},{k:'en',t:`Number ${data.number}, please prepare`,l:'en-US'},{k:'jp',t:`${data.number} 番の旅人様、ご準備ください`,l:'ja-JP'}];
                conf.forEach(c => { if(data.langs[c.k].enabled) { const u = new SpeechSynthesisUtterance(c.t); u.voice = voices.find(v => v.name === data.langs[c.k].voice); u.lang = c.l; queue.push(u); } });
                const play = (i) => { if (i >= queue.length) { isSpeaking = false; return; } queue[i].onend = () => play(i+1); synth.speak(queue[i]); };
                play(0);
            }, 200);
        }
    </script>
</body>
</html>
