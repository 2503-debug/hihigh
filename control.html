<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi&High 控制台 - 專業管理系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00a8ff; --secondary: #1e293b; --accent: #f1c40f; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'PingFang TC', sans-serif; background: #f1f5f9; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); flex-shrink: 0; }
        .sidebar-header { padding: 15px; background: var(--secondary); color: white; text-align: center; }
        .sidebar-content { padding: 10px; flex-grow: 1; overflow-y: auto; }

        .main-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-item { background: #f8fafc; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 0.85rem; color: #64748b; font-weight: bold; }

        .history-list { font-size: 0.85rem; }
        .history-item { padding: 8px; border-bottom: 1px solid #f1f5f9; background: #fff; margin-bottom: 6px; border-radius: 6px; border-left: 4px solid var(--primary); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .history-num { font-weight: bold; color: var(--secondary); font-size: 1rem; }
        .history-time { font-size: 0.7rem; color: #94a3b8; }
        .history-body { font-size: 0.75rem; color: #475569; line-height: 1.4; background: #f8fafc; padding: 5px; border-radius: 4px; }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--secondary); font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-step { background: #e2e8f0; color: var(--secondary); font-size: 1.1rem; }
        
        .voice-section { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .lang-options { display: flex; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #ddd; }
        .lang-item { display: flex; align-items: center; gap: 4px; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        
        #preview-bg { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2 style="margin:0; font-size:1rem;">📊 現場實時監控</h2></div>
        <div class="sidebar-content">
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-value" id="onlineCount">0</span>
                    <span class="stat-label">📱 手機候位中</span>
                </div>
            </div>
            <h3 style="font-size:0.85rem; color:var(--secondary); border-left:3px solid var(--primary); padding-left:8px; margin-bottom:10px;">🕒 叫號紀錄 (50筆)</h3>
            <div id="historyList" class="history-list"><p style="color:#94a3b8; font-size:0.8rem;">尚無紀錄...</p></div>
        </div>
    </div>

    <div class="main-content">
        <div class="card">
            <h2 style="margin-top:0; color:var(--primary); font-size:1.3rem;">🚀 號碼廣播控制</h2>
            <div class="control-group">
                <label>目前號碼</label>
                <input type="number" id="numInput" value="0">
                <div class="btn-row">
                    <button class="btn-step" onclick="adjustNum(-1)">- 1</button>
                    <button class="btn-step" onclick="adjustNum(1)">+ 1</button>
                </div>
                <div class="voice-section">
                    <label>語言開關</label>
                    <div class="lang-options">
                        <label class="lang-item"><input type="checkbox" id="chk_zh" checked> 中</label>
                        <label class="lang-item"><input type="checkbox" id="chk_en" checked> 英</label>
                        <label class="lang-item"><input type="checkbox" id="chk_jp" checked> 日</label>
                    </div>
                    <label>中文人聲</label><select id="voice_zh"></select>
                    <label style="margin-top:8px;">英文人聲</label><select id="voice_en"></select>
                    <label style="margin-top:8px;">日文人聲</label><select id="voice_jp"></select>
                </div>
                <button class="btn-success" style="width:100%; margin-top:15px; font-size:1.1rem;" onclick="sendData('num')">發送叫號指令</button>
            </div>
        </div>

        <div class="card" style="border-top: 5px solid var(--accent);">
            <h2 style="margin-top:0; color:var(--secondary); font-size:1.3rem;">🎟️ 發券進度管理</h2>
            <div class="control-group">
                <label>目前已抽發總號碼數</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="totalIssuedInput" value="0" style="font-size: 1.5rem; color: var(--danger); font-weight: bold;">
                    <button class="btn-primary" style="flex: 0.4;" onclick="sendTotalIssued()">更新總數</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0; color:var(--primary); font-size:1.3rem;">📢 看板內容與背景</h2>
            <div class="control-group">
                <label>跑馬燈訊息</label>
                <input type="text" id="msgInput" placeholder="請輸入訊息...">
                <div class="btn-row">
                    <button class="btn-primary" onclick="sendData('msg')">更新文字</button>
                    <button style="background:#64748b; color:white; flex:0.3;" onclick="clearMsg()">清空</button>
                </div>
            </div>
            <div class="control-group">
                <label>上傳背景圖片</label>
                <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
                <img id="preview-bg" src="" alt="預覽">
                <button class="btn-primary" style="margin-top:10px; width:100%;" onclick="sendData('bg')">更新背景</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const synth = window.speechSynthesis;
        let currentBgBase64 = "";

        function loadVoices() {
            const voices = synth.getVoices();
            const zhSelect = document.getElementById('voice_zh');
            const enSelect = document.getElementById('voice_en');
            const jpSelect = document.getElementById('voice_jp');
            [zhSelect, enSelect, jpSelect].forEach(s => s.innerHTML = '');
            voices.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name; opt.innerText = v.name;
                if (v.lang.includes('zh')) zhSelect.appendChild(opt.cloneNode(true));
                if (v.lang.includes('en')) enSelect.appendChild(opt.cloneNode(true));
                if (v.lang.includes('ja')) jpSelect.appendChild(opt.cloneNode(true));
            });
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentBgBase64 = e.target.result;
                    const preview = document.getElementById('preview-bg');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        db.ref('traveler_stats').on('value', snap => {
            const stats = snap.val() || {};
            document.getElementById('onlineCount').innerText = Object.keys(stats).length;
        });

        db.ref('issue_stats/totalIssued').on('value', snap => {
            if(snap.exists()) document.getElementById('totalIssuedInput').value = snap.val();
        });

        function sendTotalIssued() {
            db.ref('issue_stats').set({ totalIssued: parseInt(document.getElementById('totalIssuedInput').value), timestamp: Date.now() });
            alert("發券總數已更新");
        }

        let callHistory = [];
        db.ref('call_data').on('value', snap => {
            const data = snap.val();
            if (!data || data.updateType !== 'num') return;
            if (callHistory.length === 0 || callHistory[0].timestamp !== data.timestamp) {
                const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                let l = [];
                if(data.langs.zh.enabled) l.push("中");
                if(data.langs.en.enabled) l.push("英");
                if(data.langs.jp.enabled) l.push("日");
                callHistory.unshift({ number: data.number, time: time, timestamp: data.timestamp, msg: data.message || "(無訊息)", langs: l.join('/') });
                if (callHistory.length > 50) callHistory.pop();
                document.getElementById('historyList').innerHTML = callHistory.map(h => `<div class="history-item"><div class="history-header"><span class="history-num">#${h.number.toString().padStart(3, '0')}</span><span class="history-time">${h.time}</span></div><div class="history-body">💬 ${h.msg}<br>🎙️ 語言：${h.langs}</div></div>`).join('');
            }
        });

        function adjustNum(offset) {
            const input = document.getElementById('numInput');
            input.value = Math.max(0, parseInt(input.value) + offset);
        }

        function clearMsg() {
            document.getElementById('msgInput').value = "";
            sendData('msg');
        }

        function sendData(type) {
            db.ref('call_data').set({
                number: parseInt(document.getElementById('numInput').value),
                message: document.getElementById('msgInput').value,
                bg: (type === 'bg') ? currentBgBase64 : (type === 'num' ? "" : ""),
                updateType: type,
                timestamp: Date.now(),
                repeat: 1, volume: 1,
                langs: {
                    zh: { enabled: document.getElementById('chk_zh').checked, voice: document.getElementById('voice_zh').value },
                    en: { enabled: document.getElementById('chk_en').checked, voice: document.getElementById('voice_en').value },
                    jp: { enabled: document.getElementById('chk_jp').checked, voice: document.getElementById('voice_jp').value }
                }
            });
        }
    </script>
</body>
</html>
