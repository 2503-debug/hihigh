<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Hi&High 控制台 (最終整合版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 480px; }
        .section { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .section-title { font-weight: bold; color: #1e293b; margin-bottom: 10px; display: block; border-left: 4px solid #00a8ff; padding-left: 8px; }
        .input-row { display: flex; gap: 8px; margin-top: 5px; }
        input[type="number"], input[type="text"] { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        input[type="text"] { flex-grow: 1; }
        input[type="number"] { font-size: 1.2rem; width: 80px; text-align: center; border: 2px solid #00a8ff; }
        button { padding: 10px 15px; border-radius: 6px; cursor: pointer; border: none; font-weight: bold; color: white; }
        .btn-blue { background: #00a8ff; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #ff0000; }
        .btn-orange { background: #e67e22; }
        .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8rem; }
        select { width: 100%; padding: 3px; }
        .img-preview { width: 100%; height: 60px; border: 2px dashed #cbd5e1; border-radius: 6px; margin-top: 5px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#004e92; margin-top:0; text-align:center;">Hi&High 系統主控台</h2>
        
        <div class="section">
            <span class="section-title">1. 號碼叫號</span>
            <div class="input-row">
                <input type="number" id="inputNum" value="0">
                <button class="btn-blue" style="flex-grow:1" onclick="sync('num')">確認叫號</button>
                <button class="btn-green" onclick="nextNum()">+1</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">2. 跑馬燈公告</span>
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="輸入公告文字...">
                <button class="btn-red" onclick="sync('msg')">同步訊息</button>
            </div>
        </div>

        <div class="section">
            <span class="section-title">3. 看板背景</span>
            <input type="file" id="bgInput" accept="image/*" style="font-size:0.8rem">
            <div id="preview" class="img-preview">預覽圖</div>
            <button class="btn-orange" style="width:100%; margin-top:8px;" onclick="sync('bg')">同步更換背景</button>
        </div>

        <div class="section">
            <span class="section-title">4. 語音細節</span>
            <div style="margin-bottom:8px;">音量：<input type="range" id="volRange" min="0" max="1" step="0.1" value="1"> 
                重複：<input type="number" id="repeat" value="1" min="1" style="width:35px"></div>
            <div class="voice-grid">
                <div><input type="checkbox" id="chkZh" checked>中 <select id="selZh"></select></div>
                <div><input type="checkbox" id="chkEn" checked>英 <select id="selEn"></select></div>
                <div><input type="checkbox" id="chkJp" checked>日 <select id="selJp"></select></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzy6jIBIV09mPZC291JWS6eRcOPGMv9To",
            authDomain: "hihigh-system.firebaseapp.com",
            databaseURL: "https://hihigh-system-default-rtdb.firebaseio.com",
            projectId: "hihigh-system",
            storageBucket: "hihigh-system.firebasestorage.app",
            messagingSenderId: "969837475229",
            appId: "1:969837475229:web:a3ed6b20ba2fe9a5602b74",
            measurementId: "G-V62MTFXC8N"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalBg = null;

        document.getElementById('bgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                globalBg = ev.target.result;
                document.getElementById('preview').style.backgroundImage = `url(${globalBg})`;
                document.getElementById('preview').innerText = "";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function loadVoices() {
            const v = window.speechSynthesis.getVoices();
            const fill = (id, lang, prefer) => {
                const el = document.getElementById(id);
                const filtered = v.filter(s => s.lang.toLowerCase().includes(lang));
                el.innerHTML = filtered.length ? filtered.map(s => `<option value="${s.name}" ${s.name.includes(prefer)?'selected':''}>${s.name.substring(0,10)}</option>`).join('') : '<option value="">預設</option>';
            };
            fill('selZh', 'zh', 'Yating'); fill('selEn', 'en', 'Zira'); fill('selJp', 'ja', 'Google');
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        window.onload = loadVoices;

        function nextNum() {
            document.getElementById('inputNum').value = parseInt(document.getElementById('inputNum').value) + 1;
            sync('num');
        }

        function sync(type) {
            db.ref('call_data').set({
                number: parseInt(document.getElementById('inputNum').value),
                message: document.getElementById('msgInput').value,
                volume: parseFloat(document.getElementById('volRange').value),
                repeat: parseInt(document.getElementById('repeat').value),
                bg: globalBg,
                langs: {
                    zh: { enabled: document.getElementById('chkZh').checked, voice: document.getElementById('selZh').value },
                    en: { enabled: document.getElementById('chkEn').checked, voice: document.getElementById('selEn').value },
                    jp: { enabled: document.getElementById('chkJp').checked, voice: document.getElementById('selJp').value }
                },
                timestamp: Date.now(),
                updateType: type
            });
        }
    </script>
</body>
</html>
